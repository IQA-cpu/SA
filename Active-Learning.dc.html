  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ent-soft:#dcefe3;min-height:100vh;background:#f0f4f1;color:#3a4550;font-family:'Public Sans',system-ui,sans-serif;\">\n\n  <header style=\"position:sticky;top:0;z-index:50;background:rgba(240,244,241,0.88);backdrop-filter:blur(12px);border-bottom:1px solid #dbe5de;\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:12px clamp(18px,5vw,48px);display:flex;align-items:center;gap:14px;flex-wrap:wrap;\">\n      <a href=\"Explore.dc.html\" style=\"display:flex;align-items:center;gap:11px;\">\n        <span style=\"background:#16293f;color:#f0f4f1;font-family:'Schibsted Grotesk';font-weight:700;font-size:13px;padding:7px 10px;border-radius:7px;\">ACCT 341<\u002Fspan>\n        <span style=\"font-family:'Schibsted Grotesk';font-weight:700;font-size:16px;color:#16293f;\">Statutory Auditing<\u002Fspan>\n      <\u002Fa>\n      <nav style=\"margin-left:auto;display:flex;align-items:center;gap:1px;font-family:'Schibsted Grotesk';font-weight:600;font-size:13.5px;flex-wrap:wrap;\">\n        <a href=\"Explore.dc.html\" style=\"padding:8px 11px;border-radius:9px;color:#16293f;\">Home<\u002Fa>\n        <a href=\"Explorer.dc.html\" style=\"padding:8px 11px;border-radius:9px;color:#16293f;\">Classroom<\u002Fa>\n        <a href=\"Syllabus.dc.html\" style=\"padding:8px 11px;border-radius:9px;color:#16293f;\">Syllabus<\u002Fa>\n        <a href=\"Study-Hub.dc.html\" style=\"padding:8px 11px;border-radius:9px;color:#16293f;\">Study Hub<\u002Fa>\n        <a href=\"Lecturer.dc.html\" style=\"padding:8px 11px;border-radius:9px;color:#16293f;\">Lecturer<\u002Fa>\n        <a href=\"Student.dc.html\" style=\"padding:8px 11px;border-radius:9px;color:#16293f;\">Student<\u002Fa>\n        <a href=\"Active-Learning.dc.html\" style=\"padding:8px 11px;border-radius:9px;background:rgba(47,138,91,0.14);color:var(--accent-deep);\">Active Learning<\u002Fa>\n        <a href=\"Relax-Zone.dc.html\" style=\"padding:8px 11px;border-radius:9px;color:#16293f;\">Relax Zone<\u002Fa>\n        <a href=\"SA-Chatbot.dc.html\" style=\"padding:8px 11px;border-radius:9px;color:#16293f;\">SA Chatbot<\u002Fa>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <section style=\"max-width:1180px;margin:0 auto;padding:clamp(38px,5vw,60px) clamp(18px,5vw,48px) clamp(24px,3vw,36px);\">\n    <p style=\"font-size:13px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--accent-deep);margin:0 0 14px;\">Engage &amp; apply<\u002Fp>\n    <h1 style=\"font-family:'Schibsted Grotesk';font-weight:800;font-size:clamp(32px,5vw,52px);line-height:1.02;letter-spacing:-0.025em;color:#16293f;margin:0 0 16px;\">Active Learning<\u002Fh1>\n    <p style=\"font-size:16px;line-height:1.65;color:#4a5560;max-width:46em;margin:0;\">Auditing is best learned by doing. These in-class activities turn ISAs, risk assessment and evidence-gathering into practice — through collaboration, real scenarios, friendly competition and hands-on problem solving.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- TOOLKIT HEADING -->\n  <section style=\"max-width:1180px;margin:0 auto;padding:clamp(16px,3vw,26px) clamp(18px,5vw,48px) clamp(6px,1.5vw,12px);\">\n    <p style=\"font-size:13px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--accent-deep);margin:0 0 12px;\">Run the room<\u002Fp>\n    <h2 style=\"font-family:'Schibsted Grotesk';font-weight:800;font-size:clamp(26px,4vw,40px);line-height:1.02;letter-spacing:-0.02em;color:#16293f;margin:0 0 12px;\">Classroom Toolkit<\u002Fh2>\n    <p style=\"font-size:15.5px;line-height:1.65;color:#4a5560;max-width:44em;margin:0;\">Everything you need to run an active class in one place — pick a student at random, split the room into balanced groups, time-box a task, roll for an exercise, signal the room and keep score during friendly competitions.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- SPINNER + GROUPS -->\n  <section style=\"max-width:1180px;margin:0 auto;padding:clamp(8px,2vw,18px) clamp(18px,5vw,48px) 0;\">\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;\">\n\n      <!-- SPINNER -->\n      <div style=\"background:#fff;border:1px solid #dbe5de;border-radius:18px;padding:26px;box-shadow:0 22px 46px -38px rgba(22,41,63,0.3);\">\n        <p style=\"margin:0 0 3px;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-deep);\">Random picker<\u002Fp>\n        <p style=\"margin:0 0 18px;font-family:'Schibsted Grotesk';font-weight:700;font-size:21px;color:#16293f;\">Lucky Student Spinner<\u002Fp>\n\n        <div style=\"display:flex;justify-content:center;margin-bottom:16px;position:relative;\">\n          <div style=\"position:absolute;top:-6px;left:50%;transform:translateX(-50%);z-index:3;width:0;height:0;border-left:11px solid transparent;border-right:11px solid transparent;border-top:18px solid #16293f;\"><\u002Fdiv>\n          <svg viewBox=\"0 0 200 200\" style=\"width:min(300px,72vw);height:min(300px,72vw);transform:rotate({{ rot }}deg);transition:{{ spinTransition }};\">\n            <sc-for list=\"{{ segments }}\" as=\"s\" hint-placeholder-count=\"6\">\n              <path d=\"{{ s.d }}\" fill=\"{{ s.fill }}\" stroke=\"#f0f4f1\" stroke-width=\"0.6\"><\u002Fpath>\n            <\u002Fsc-for>\n            <sc-for list=\"{{ segments }}\" as=\"s\" hint-placeholder-count=\"6\">\n              <text x=\"{{ s.tx }}\" y=\"{{ s.ty }}\" fill=\"{{ s.color }}\" font-size=\"{{ s.fs }}\" font-family=\"Schibsted Grotesk, sans-serif\" font-weight=\"700\" text-anchor=\"middle\" dominant-baseline=\"middle\" transform=\"rotate({{ s.rotate }} {{ s.tx }} {{ s.ty }})\">{{ s.label }}<\u002Ftext>\n            <\u002Fsc-for>\n            <circle cx=\"100\" cy=\"100\" r=\"15\" fill=\"#16293f\"><\u002Fcircle>\n            <circle cx=\"100\" cy=\"100\" r=\"15\" fill=\"none\" stroke=\"var(--accent)\" stroke-width=\"2\"><\u002Fcircle>\n          <\u002Fsvg>\n        <\u002Fdiv>\n\n        <div style=\"text-align:center;min-height:30px;margin-bottom:14px;\">\n          <sc-if value=\"{{ hasWinner }}\" hint-placeholder-val=\"{{ false }}\">\n            <p style=\"margin:0;font-family:'Schibsted Grotesk';font-weight:800;font-size:22px;color:var(--accent-deep);\">🎉 {{ winner }}<\u002Fp>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;gap:10px;justify-content:center;margin-bottom:18px;flex-wrap:wrap;\">\n          <button onclick=\"{{ spin }}\" style=\"{{ spinBtnStyle }}\">{{ spinLabel }}<\u002Fbutton>\n          <button onclick=\"{{ removeWinner }}\" style=\"background:transparent;border:1px solid #c9d5cc;color:#16293f;font-family:'Schibsted Grotesk';font-weight:700;font-size:14px;padding:12px 18px;border-radius:10px;cursor:pointer;\">Remove picked<\u002Fbutton>\n          <button onclick=\"{{ clearNames }}\" style=\"background:transparent;border:1px solid #e6cdcb;color:#b3453f;font-family:'Schibsted Grotesk';font-weight:700;font-size:14px;padding:12px 18px;border-radius:10px;cursor:pointer;\">Clear<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;align-items:center;gap:12px;margin:0 0 8px;\">\n          <p style=\"margin:0;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#8a8678;\">Class list — one name per line<\u002Fp>\n          <label style=\"margin-left:auto;display:inline-flex;align-items:center;gap:6px;background:var(--accent-soft);color:var(--accent-deep);font-family:'Schibsted Grotesk';font-weight:700;font-size:12.5px;padding:7px 13px;border-radius:9px;cursor:pointer;white-space:nowrap;\">\n            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3v13\"><\u002Fpath><path d=\"m7 8 5-5 5 5\"><\u002Fpath><path d=\"M5 21h14\"><\u002Fpath><\u002Fsvg>\n            Upload Excel / CSV\n            <input type=\"file\" accept=\".xlsx,.xls,.csv,.txt\" onchange=\"{{ onFile }}\" style=\"display:none;\">\n          <\u002Flabel>\n        <\u002Fdiv>\n        <textarea value=\"{{ names }}\" oninput=\"{{ onNames }}\" placeholder=\"Sokha\nDara\nChan\nBopha…\" style=\"width:100%;min-height:120px;resize:vertical;border:1.5px solid #dbe5de;border-radius:11px;padding:12px 14px;font-size:14px;line-height:1.6;color:#16293f;background:#f5faf6;outline:none;\"><\u002Ftextarea>\n        <p style=\"margin:10px 0 0;font-size:12.5px;color:{{ uploadColor }};\">{{ uploadMsg }}<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- GROUPS -->\n      <div style=\"background:#fff;border:1px solid #dbe5de;border-radius:18px;padding:26px;box-shadow:0 22px 46px -38px rgba(22,41,63,0.3);\">\n        <p style=\"margin:0 0 3px;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-deep);\">Team builder<\u002Fp>\n        <p style=\"margin:0 0 18px;font-family:'Schibsted Grotesk';font-weight:700;font-size:21px;color:#16293f;\">Random Group Maker<\u002Fp>\n\n        <div style=\"display:flex;flex-wrap:wrap;gap:9px;align-items:center;margin-bottom:14px;\">\n          <span style=\"font-size:13px;color:#8a8678;font-weight:600;\">Split by<\u002Fspan>\n          <button onclick=\"{{ setModeCount }}\" style=\"{{ modeCountStyle }}\">Number of groups<\u002Fbutton>\n          <button onclick=\"{{ setModeSize }}\" style=\"{{ modeSizeStyle }}\">Students per group<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:10px;align-items:center;margin-bottom:16px;\">\n          <span style=\"font-size:14px;color:#4a5560;\">{{ groupPrompt }}<\u002Fspan>\n          <input type=\"number\" min=\"1\" max=\"20\" value=\"{{ groupN }}\" oninput=\"{{ onGroupN }}\" style=\"width:70px;text-align:center;font-weight:700;font-size:16px;color:#16293f;border:1.5px solid #dbe5de;border-radius:9px;padding:9px 6px;background:#f5faf6;\">\n          <button onclick=\"{{ makeGroups }}\" style=\"margin-left:auto;background:#16293f;color:#f0f4f1;font-family:'Schibsted Grotesk';font-weight:700;font-size:14px;padding:11px 18px;border-radius:10px;cursor:pointer;\">Make groups<\u002Fbutton>\n          <button onclick=\"{{ clearGroups }}\" style=\"background:transparent;border:1px solid #e6cdcb;color:#b3453f;font-family:'Schibsted Grotesk';font-weight:700;font-size:14px;padding:11px 16px;border-radius:10px;cursor:pointer;\">Clear<\u002Fbutton>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ hasGroups }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;\">\n            <sc-for list=\"{{ groups }}\" as=\"g\" hint-placeholder-count=\"4\">\n              <div style=\"background:#f5faf6;border:1px solid #e2ebe4;border-radius:12px;padding:14px 16px;\">\n                <p style=\"margin:0 0 8px;font-family:'Schibsted Grotesk';font-weight:800;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--accent-deep);\">{{ g.label }}<\u002Fp>\n                <div style=\"display:flex;flex-direction:column;gap:5px;\">\n                  <sc-for list=\"{{ g.members }}\" as=\"mname\" hint-placeholder-count=\"3\">\n                    <span style=\"font-size:13.5px;color:#16293f;font-weight:600;\">{{ mname }}<\u002Fspan>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noGroups }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"text-align:center;padding:30px 16px;color:#8b978d;border:1px dashed #dbe5de;border-radius:12px;font-size:13.5px;\">Add a class list on the left, then make groups.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- TIMER + SCOREBOARD -->\n  <section style=\"max-width:1180px;margin:0 auto;padding:clamp(16px,3vw,28px) clamp(18px,5vw,48px) clamp(48px,7vw,84px);\">\n    <div style=\"display:grid;grid-template-columns:1fr 1.2fr;gap:16px;align-items:start;\">\n\n      <!-- TIMER -->\n      <div style=\"background:#16293f;border-radius:18px;padding:28px;color:#fff;box-shadow:0 44px 84px -52px rgba(22,41,63,0.6);\">\n        <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:12px;\">\n          <div>\n            <p style=\"margin:0 0 3px;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);\">Time-box a task<\u002Fp>\n            <p style=\"margin:0 0 20px;font-family:'Schibsted Grotesk';font-weight:700;font-size:21px;color:#f0f4f1;\">Countdown Timer<\u002Fp>\n          <\u002Fdiv>\n          <button onclick=\"{{ openTimerFs }}\" title=\"Full screen\" style=\"flex-shrink:0;display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.16);color:#cdd5dd;font-family:'Schibsted Grotesk';font-weight:700;font-size:12.5px;padding:8px 12px;border-radius:9px;cursor:pointer;\">\n            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M8 3H5a2 2 0 0 0-2 2v3\"><\u002Fpath><path d=\"M21 8V5a2 2 0 0 0-2-2h-3\"><\u002Fpath><path d=\"M3 16v3a2 2 0 0 0 2 2h3\"><\u002Fpath><path d=\"M16 21h3a2 2 0 0 0 2-2v-3\"><\u002Fpath><\u002Fsvg>\n            Full screen\n          <\u002Fbutton>\n        <\u002Fdiv>\n        <p style=\"margin:0 0 16px;font-family:'Schibsted Grotesk';font-weight:800;font-size:clamp(52px,9vw,72px);line-height:1;color:{{ timerColor }};text-align:center;letter-spacing:.01em;\">{{ timerDisplay }}<\u002Fp>\n        <div style=\"display:flex;gap:8px;justify-content:center;margin-bottom:16px;flex-wrap:wrap;\">\n          <sc-for list=\"{{ presets }}\" as=\"p\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ p.onClick }}\" style=\"background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.16);color:#cdd5dd;font-family:'Schibsted Grotesk';font-weight:700;font-size:13px;padding:8px 14px;border-radius:8px;cursor:pointer;\">{{ p.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:8px;justify-content:center;align-items:center;margin-bottom:16px;\">\n          <span style=\"font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#8ea0b4;\">Custom<\u002Fspan>\n          <input type=\"number\" min=\"0\" max=\"180\" value=\"{{ customMin }}\" oninput=\"{{ onCustomMin }}\" style=\"width:58px;text-align:center;font-family:'Schibsted Grotesk';font-weight:700;font-size:15px;color:#16293f;background:#f0f4f1;border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:8px 6px;\">\n          <span style=\"color:#8ea0b4;font-weight:700;\">min<\u002Fspan>\n          <input type=\"number\" min=\"0\" max=\"59\" value=\"{{ customSec }}\" oninput=\"{{ onCustomSec }}\" style=\"width:58px;text-align:center;font-family:'Schibsted Grotesk';font-weight:700;font-size:15px;color:#16293f;background:#f0f4f1;border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:8px 6px;\">\n          <span style=\"color:#8ea0b4;font-weight:700;\">sec<\u002Fspan>\n          <button onclick=\"{{ applyCustom }}\" style=\"background:rgba(255,255,255,0.14);border:1px solid rgba(255,255,255,0.22);color:#f0f4f1;font-family:'Schibsted Grotesk';font-weight:700;font-size:13px;padding:8px 14px;border-radius:8px;cursor:pointer;\">Set<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:10px;justify-content:center;\">\n          <button onclick=\"{{ toggleTimer }}\" style=\"flex:1;background:var(--accent);color:#16293f;font-family:'Schibsted Grotesk';font-weight:700;font-size:15px;padding:12px;border:0;border-radius:10px;cursor:pointer;\">{{ timerBtn }}<\u002Fbutton>\n          <button onclick=\"{{ resetTimer }}\" style=\"background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.16);color:#cdd5dd;font-family:'Schibsted Grotesk';font-weight:700;font-size:14px;padding:12px 18px;border-radius:10px;cursor:pointer;\">Reset<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- SCOREBOARD -->\n      <div style=\"background:#fff;border:1px solid #dbe5de;border-radius:18px;padding:26px;box-shadow:0 22px 46px -38px rgba(22,41,63,0.3);\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;\">\n          <div>\n            <p style=\"margin:0 0 3px;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-deep);\">Friendly competition<\u002Fp>\n            <p style=\"margin:0;font-family:'Schibsted Grotesk';font-weight:700;font-size:21px;color:#16293f;\">Scoreboard<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:8px;margin-bottom:16px;\">\n          <input type=\"text\" value=\"{{ teamInput }}\" oninput=\"{{ onTeamInput }}\" placeholder=\"Team name…\" style=\"flex:1;min-width:0;border:1.5px solid #dbe5de;border-radius:10px;padding:11px 14px;font-size:14.5px;color:#16293f;background:#f5faf6;outline:none;\">\n          <button onclick=\"{{ addTeam }}\" style=\"background:#16293f;color:#f0f4f1;font-family:'Schibsted Grotesk';font-weight:700;font-size:14px;padding:11px 18px;border-radius:10px;cursor:pointer;\">Add team<\u002Fbutton>\n        <\u002Fdiv>\n        <sc-if value=\"{{ hasTeams }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;flex-direction:column;gap:9px;\">\n            <sc-for list=\"{{ teams }}\" as=\"t\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;align-items:center;gap:12px;background:{{ t.bg }};border:1px solid {{ t.border }};border-radius:12px;padding:12px 14px;\">\n                <span style=\"flex-shrink:0;width:26px;height:26px;border-radius:8px;background:{{ t.rankBg }};color:{{ t.rankColor }};font-family:'Schibsted Grotesk';font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;\">{{ t.rank }}<\u002Fspan>\n                <span style=\"flex:1;min-width:0;font-family:'Schibsted Grotesk';font-weight:700;font-size:15.5px;color:#16293f;\">{{ t.name }}<\u002Fspan>\n                <span style=\"font-family:'Schibsted Grotesk';font-weight:800;font-size:20px;color:var(--accent-deep);width:38px;text-align:center;\">{{ t.score }}<\u002Fspan>\n                <button onclick=\"{{ t.minus }}\" style=\"width:32px;height:32px;border-radius:8px;border:1px solid #dbe5de;background:#f5faf6;color:#6b7480;font-size:18px;font-weight:700;cursor:pointer;line-height:1;\">−<\u002Fbutton>\n                <button onclick=\"{{ t.plus }}\" style=\"width:32px;height:32px;border-radius:8px;border:0;background:var(--accent);color:#16293f;font-size:18px;font-weight:700;cursor:pointer;line-height:1;\">+<\u002Fbutton>\n                <button onclick=\"{{ t.remove }}\" style=\"width:32px;height:32px;border-radius:8px;border:1px solid #dbe5de;background:transparent;color:#b0a894;font-size:14px;cursor:pointer;line-height:1;\">✕<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noTeams }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"text-align:center;padding:30px 16px;color:#8b978d;border:1px dashed #dbe5de;border-radius:12px;font-size:13.5px;\">Add teams to start keeping score.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- RANDOM NUMBER + ATTENTION SIGNAL -->\n  <section style=\"max-width:1180px;margin:0 auto;padding:0 clamp(18px,5vw,48px) clamp(16px,3vw,28px);\">\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:stretch;\">\n\n      <!-- RANDOM NUMBER -->\n      <div style=\"background:#fff;border:1px solid #dbe5de;border-radius:18px;padding:26px;box-shadow:0 22px 46px -38px rgba(22,41,63,0.3);display:flex;flex-direction:column;\">\n        <p style=\"margin:0 0 3px;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-deep);\">Pick at random<\u002Fp>\n        <p style=\"margin:0 0 6px;font-family:'Schibsted Grotesk';font-weight:700;font-size:21px;color:#16293f;\">Random Number<\u002Fp>\n        <div style=\"flex:1;display:flex;align-items:center;justify-content:center;min-height:120px;\">\n          <span style=\"font-family:'Schibsted Grotesk';font-weight:800;font-size:clamp(56px,11vw,90px);line-height:1;color:{{ rnColor }};\">{{ rnDisplay }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:10px;align-items:flex-end;margin-bottom:12px;\">\n          <label style=\"flex:1;font-size:12px;font-weight:700;color:#8a8678;\">From\n            <input type=\"number\" value=\"{{ rnFrom }}\" oninput=\"{{ onRnFrom }}\" style=\"display:block;width:100%;margin-top:5px;border:1.5px solid #dbe5de;border-radius:9px;padding:10px 12px;font-size:15px;font-weight:700;color:#16293f;background:#f5faf6;outline:none;\">\n          <\u002Flabel>\n          <label style=\"flex:1;font-size:12px;font-weight:700;color:#8a8678;\">To\n            <input type=\"number\" value=\"{{ rnTo }}\" oninput=\"{{ onRnTo }}\" style=\"display:block;width:100%;margin-top:5px;border:1.5px solid #dbe5de;border-radius:9px;padding:10px 12px;font-size:15px;font-weight:700;color:#16293f;background:#f5faf6;outline:none;\">\n          <\u002Flabel>\n          <button onclick=\"{{ roll }}\" style=\"background:#16293f;color:#f0f4f1;font-family:'Schibsted Grotesk';font-weight:700;font-size:15px;padding:11px 22px;border:0;border-radius:10px;cursor:pointer;\">Roll<\u002Fbutton>\n        <\u002Fdiv>\n        <p style=\"margin:0;font-size:12.5px;color:#8b978d;\">Pick an exercise, ISA number, question or page at random.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- ATTENTION SIGNAL -->\n      <div style=\"background:#fff;border:1px solid #dbe5de;border-radius:18px;padding:26px;box-shadow:0 22px 46px -38px rgba(22,41,63,0.3);display:flex;flex-direction:column;\">\n        <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:12px;\">\n          <div>\n            <p style=\"margin:0 0 3px;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-deep);\">Manage the room<\u002Fp>\n            <p style=\"margin:0 0 6px;font-family:'Schibsted Grotesk';font-weight:700;font-size:21px;color:#16293f;\">Attention Signal<\u002Fp>\n          <\u002Fdiv>\n          <button onclick=\"{{ openSignalFs }}\" title=\"Full screen\" style=\"flex-shrink:0;display:inline-flex;align-items:center;gap:6px;background:var(--accent-soft);border:1px solid #cfe4d7;color:var(--accent-deep);font-family:'Schibsted Grotesk';font-weight:700;font-size:12.5px;padding:8px 12px;border-radius:9px;cursor:pointer;\">\n            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M8 3H5a2 2 0 0 0-2 2v3\"><\u002Fpath><path d=\"M21 8V5a2 2 0 0 0-2-2h-3\"><\u002Fpath><path d=\"M3 16v3a2 2 0 0 0 2 2h3\"><\u002Fpath><path d=\"M16 21h3a2 2 0 0 0 2-2v-3\"><\u002Fpath><\u002Fsvg>\n            Full screen\n          <\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"flex:1;display:flex;align-items:center;justify-content:center;gap:clamp(20px,5vw,44px);padding:14px 0;\">\n          <div onclick=\"{{ setWork }}\" style=\"display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;\">\n            <span style=\"{{ workDot }}\"><\u002Fspan>\n            <span style=\"font-family:'Schibsted Grotesk';font-weight:700;font-size:13.5px;color:{{ workText }};\">Work<\u002Fspan>\n          <\u002Fdiv>\n          <div onclick=\"{{ setWrap }}\" style=\"display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;\">\n            <span style=\"{{ wrapDot }}\"><\u002Fspan>\n            <span style=\"font-family:'Schibsted Grotesk';font-weight:700;font-size:13.5px;color:{{ wrapText }};\">Wrap-up<\u002Fspan>\n          <\u002Fdiv>\n          <div onclick=\"{{ setStop }}\" style=\"display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;\">\n            <span style=\"{{ stopDot }}\"><\u002Fspan>\n            <span style=\"font-family:'Schibsted Grotesk';font-weight:700;font-size:13.5px;color:{{ stopText }};\">Stop<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"margin:0;font-size:12.5px;color:#8b978d;\">{{ signalHint }}<\u002Fp>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ACTIVITY METHODS -->\n  <section style=\"max-width:1180px;margin:0 auto;padding:clamp(24px,4vw,40px) clamp(18px,5vw,48px) clamp(16px,3vw,28px);\">\n    <p style=\"font-size:13px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--accent-deep);margin:0 0 12px;\">In the classroom<\u002Fp>\n    <h2 style=\"font-family:'Schibsted Grotesk';font-weight:800;font-size:clamp(26px,4vw,40px);line-height:1.02;letter-spacing:-0.02em;color:#16293f;margin:0 0 22px;\">Ways we learn actively<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;\">\n      <sc-for list=\"{{ methods }}\" as=\"m\" hint-placeholder-count=\"6\">\n        <div style=\"background:#fff;border:1px solid #dbe5de;border-radius:16px;padding:20px 22px;display:flex;align-items:center;gap:16px;box-shadow:0 18px 40px -36px rgba(22,41,63,0.3);\">\n          <span style=\"flex-shrink:0;width:46px;height:46px;border-radius:12px;background:var(--accent-soft);color:var(--accent-deep);font-family:'Schibsted Grotesk';font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center;\">{{ m.badge }}<\u002Fspan>\n          <div>\n            <p style=\"margin:0 0 3px;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#9aa79f;\">{{ m.kicker }}<\u002Fp>\n            <p style=\"margin:0;font-family:'Schibsted Grotesk';font-weight:700;font-size:17px;color:#16293f;\">{{ m.title }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer style=\"background:#16293f;color:#cdd5dd;\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:clamp(36px,5vw,56px) clamp(18px,5vw,48px) 28px;display:flex;flex-wrap:wrap;gap:16px;justify-content:space-between;align-items:center;\">\n      <div style=\"display:flex;align-items:center;gap:10px;\">\n        <span style=\"background:var(--accent);color:#16293f;font-family:'Schibsted Grotesk';font-weight:700;font-size:12px;padding:6px 9px;border-radius:6px;\">ACCT 341<\u002Fspan>\n        <span style=\"font-size:13.5px;color:#9fb0c0;\">Statutory Auditing · Mean Udam, MSc, ACCA<\u002Fspan>\n      <\u002Fdiv>\n      <a href=\"Explore.dc.html\" style=\"font-family:'Schibsted Grotesk';font-weight:700;font-size:13.5px;color:var(--accent);\">← Back to course home<\u002Fa>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <!-- TIMER FULLSCREEN OVERLAY -->\n  <sc-if value=\"{{ fsTimer }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;z-index:2000;background:#16293f;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(28px,5vh,56px);padding:5vw;\">\n      <button onclick=\"{{ closeFs }}\" title=\"Exit full screen\" style=\"position:absolute;top:clamp(18px,3vw,36px);right:clamp(18px,3vw,36px);display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#e6ecf1;font-family:'Schibsted Grotesk';font-weight:700;font-size:15px;padding:11px 18px;border-radius:11px;cursor:pointer;\">\n        <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M18 6 6 18\"><\u002Fpath><path d=\"m6 6 12 12\"><\u002Fpath><\u002Fsvg>\n        Exit\n      <\u002Fbutton>\n      <p style=\"margin:0;font-family:'Schibsted Grotesk';font-weight:700;font-size:clamp(15px,2vw,22px);letter-spacing:.14em;text-transform:uppercase;color:var(--accent);\">Countdown Timer<\u002Fp>\n      <p style=\"margin:0;font-family:'Schibsted Grotesk';font-weight:800;font-size:clamp(120px,34vw,460px);line-height:.9;color:{{ timerColor }};letter-spacing:.01em;\">{{ timerDisplay }}<\u002Fp>\n      <div style=\"display:flex;gap:clamp(10px,1.4vw,18px);justify-content:center;flex-wrap:wrap;\">\n        <sc-for list=\"{{ presets }}\" as=\"p\" hint-placeholder-count=\"4\">\n          <button onclick=\"{{ p.onClick }}\" style=\"background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.16);color:#cdd5dd;font-family:'Schibsted Grotesk';font-weight:700;font-size:clamp(15px,1.6vw,20px);padding:12px 22px;border-radius:10px;cursor:pointer;\">{{ p.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:14px;justify-content:center;\">\n        <button onclick=\"{{ toggleTimer }}\" style=\"background:var(--accent);color:#16293f;font-family:'Schibsted Grotesk';font-weight:700;font-size:clamp(18px,2vw,26px);padding:16px 48px;border:0;border-radius:13px;cursor:pointer;\">{{ timerBtn }}<\u002Fbutton>\n        <button onclick=\"{{ resetTimer }}\" style=\"background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.16);color:#cdd5dd;font-family:'Schibsted Grotesk';font-weight:700;font-size:clamp(18px,2vw,26px);padding:16px 34px;border-radius:13px;cursor:pointer;\">Reset<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ATTENTION SIGNAL FULLSCREEN OVERLAY -->\n  <sc-if value=\"{{ fsSignal }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;z-index:2000;background:{{ signalFsBg }};display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(30px,6vh,64px);padding:5vw;transition:background .4s ease;\">\n      <button onclick=\"{{ closeFs }}\" title=\"Exit full screen\" style=\"position:absolute;top:clamp(18px,3vw,36px);right:clamp(18px,3vw,36px);display:inline-flex;align-items:center;gap:8px;background:rgba(0,0,0,0.18);border:1px solid rgba(255,255,255,0.35);color:#fff;font-family:'Schibsted Grotesk';font-weight:700;font-size:15px;padding:11px 18px;border-radius:11px;cursor:pointer;\">\n        <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M18 6 6 18\"><\u002Fpath><path d=\"m6 6 12 12\"><\u002Fpath><\u002Fsvg>\n        Exit\n      <\u002Fbutton>\n      <span style=\"width:clamp(180px,26vw,340px);height:clamp(180px,26vw,340px);border-radius:50%;background:{{ signalFsColor }};box-shadow:0 0 clamp(60px,10vw,140px) {{ signalFsColor }};\"><\u002Fspan>\n      <p style=\"margin:0;font-family:'Schibsted Grotesk';font-weight:800;font-size:clamp(48px,12vw,150px);line-height:1;color:#fff;text-transform:uppercase;letter-spacing:.02em;\">{{ signalFsLabel }}<\u002Fp>\n      <div style=\"display:flex;gap:clamp(14px,2vw,28px);flex-wrap:wrap;justify-content:center;\">\n        <button onclick=\"{{ setWork }}\" style=\"background:rgba(255,255,255,0.16);border:1px solid rgba(255,255,255,0.4);color:#fff;font-family:'Schibsted Grotesk';font-weight:700;font-size:clamp(16px,1.8vw,22px);padding:13px 28px;border-radius:12px;cursor:pointer;\">Work<\u002Fbutton>\n        <button onclick=\"{{ setWrap }}\" style=\"background:rgba(255,255,255,0.16);border:1px solid rgba(255,255,255,0.4);color:#fff;font-family:'Schibsted Grotesk';font-weight:700;font-size:clamp(16px,1.8vw,22px);padding:13px 28px;border-radius:12px;cursor:pointer;\">Wrap-up<\u002Fbutton>\n        <button onclick=\"{{ setStop }}\" style=\"background:rgba(255,255,255,0.16);border:1px solid rgba(255,255,255,0.4);color:#fff;font-family:'Schibsted Grotesk';font-weight:700;font-size:clamp(16px,1.8vw,22px);padding:13px 28px;border-radius:12px;cursor:pointer;\">Stop<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  LIST_KEY = \"acct341_classlist\";\n\n  state = {\n    names: \"\", rot: 0, spinning: false, winner: null,\n    groupMode: \"count\", groupN: 4, groups: null,\n    timerSec: 300, timerRunning: false, timerBase: 300, customMin: \"5\", customSec: \"0\",\n    teams: [], teamInput: \"\",\n    rnFrom: \"1\", rnTo: \"16\", rnResult: null,\n    signal: \"work\", slide: 0,\n    uploadMsg: null, uploadErr: false, fs: null\n  };\n\n  componentDidMount() {\n    try {\n      const raw = localStorage.getItem(this.LIST_KEY);\n      if (raw) this.setState({ names: raw });\n    } catch (e) {}\n    this.slideTick = setInterval(() => {\n      this.setState(s => ({ slide: (s.slide + 1) % 4 }));\n    }, 5000);\n    this.onKey = (e) => { if (e.key === \"Escape\" && this.state.fs) this.setState({ fs: null }); };\n    window.addEventListener(\"keydown\", this.onKey);\n  }\n  componentWillUnmount() { if (this.tick) clearInterval(this.tick); if (this.slideTick) clearInterval(this.slideTick); if (this.onKey) window.removeEventListener(\"keydown\", this.onKey); }\n\n  roll() {\n    const a = parseInt(this.state.rnFrom, 10), b = parseInt(this.state.rnTo, 10);\n    if (isNaN(a) || isNaN(b)) return;\n    const lo = Math.min(a, b), hi = Math.max(a, b);\n    this.setState({ rnResult: lo + Math.floor(Math.random() * (hi - lo + 1)) });\n  }\n\n  lightStyle(active, color) {\n    return \"width:clamp(58px,9vw,78px);height:clamp(58px,9vw,78px);border-radius:50%;transition:.2s ease;background:\" +\n      (active ? color : \"#e2ebe4\") + \";box-shadow:\" +\n      (active ? \"0 0 0 4px \" + color + \"22, 0 12px 26px -10px \" + color + \"aa\" : \"inset 0 2px 6px rgba(22,41,63,0.08)\") + \";\";\n  }\n\n  parseNames() {\n    return this.state.names.split(\"\\n\").map(s => s.trim()).filter(Boolean);\n  }\n\n  onNames(v) {\n    try { localStorage.setItem(this.LIST_KEY, v); } catch (e) {}\n    this.setState({ names: v, uploadMsg: null, uploadErr: false });\n  }\n\n  onFile(input) {\n    const file = input && input.files && input.files[0];\n    if (!file) return;\n    input.value = \"\";\n    const name = file.name.toLowerCase();\n    const commit = (list) => {\n      const cleaned = list.map(s => String(s).trim()).filter(Boolean);\n      if (cleaned.length === 0) {\n        this.setState({ uploadMsg: \"No names found in that file.\", uploadErr: true });\n        return;\n      }\n      const v = cleaned.join(\"\\n\");\n      try { localStorage.setItem(this.LIST_KEY, v); } catch (e) {}\n      this.setState({ names: v, winner: null, groups: null,\n        uploadMsg: \"Loaded \" + cleaned.length + \" name\" + (cleaned.length === 1 ? \"\" : \"s\") + \" from \" + file.name + \".\", uploadErr: false });\n    };\n    const reader = new FileReader();\n    if (name.endsWith(\".xlsx\") || name.endsWith(\".xls\")) {\n      reader.onload = (e) => {\n        try {\n          if (typeof XLSX === \"undefined\") { this.setState({ uploadMsg: \"Spreadsheet reader still loading — try again in a moment.\", uploadErr: true }); return; }\n          const wb = XLSX.read(new Uint8Array(e.target.result), { type: \"array\" });\n          const ws = wb.Sheets[wb.SheetNames[0]];\n          const rows = XLSX.utils.sheet_to_json(ws, { header: 1, blankrows: false });\n          commit(this.namesFromRows(rows));\n        } catch (err) { this.setState({ uploadMsg: \"Could not read that Excel file.\", uploadErr: true }); }\n      };\n      reader.readAsArrayBuffer(file);\n    } else {\n      reader.onload = (e) => {\n        const text = String(e.target.result || \"\");\n        const rows = text.split(/\\r?\\n/).map(line => line.split(/[,\\t;]/));\n        commit(this.namesFromRows(rows));\n      };\n      reader.readAsText(file);\n    }\n  }\n\n  namesFromRows(rows) {\n    if (!rows || !rows.length) return [];\n    // detect a \"name\" column from the header row; else take the first non-empty cell of each row\n    let header = (rows[0] || []).map(c => String(c == null ? \"\" : c).trim().toLowerCase());\n    let nameCol = header.findIndex(h => /name|student|full ?name|nom/.test(h));\n    let start = 0;\n    if (nameCol === -1) {\n      nameCol = 0;\n      // if first row looks like a header (single word \"names\"/\"list\"), skip it\n      if (header.length === 1 && /name|student|list/.test(header[0])) start = 1;\n    } else {\n      start = 1;\n    }\n    const out = [];\n    for (let i = start; i < rows.length; i++) {\n      const row = rows[i] || [];\n      let cell = row[nameCol];\n      if (cell == null || String(cell).trim() === \"\") {\n        cell = row.find(c => c != null && String(c).trim() !== \"\");\n      }\n      if (cell != null && String(cell).trim() !== \"\") out.push(cell);\n    }\n    return out;\n  }\n\n  spin() {\n    const names = this.parseNames();\n    if (names.length < 2 || this.state.spinning) return;\n    const n = names.length;\n    const seg = 360 / n;\n    const winnerIndex = Math.floor(Math.random() * n);\n    const base = Math.ceil((this.state.rot + 1) / 360) * 360;\n    const target = base + 360 * 4 + (360 - (winnerIndex + 0.5) * seg);\n    this.setState({ rot: target, spinning: true, winner: null });\n    if (this.spinTO) clearTimeout(this.spinTO);\n    this.spinTO = setTimeout(() => {\n      this.setState({ spinning: false, winner: names[winnerIndex] });\n    }, 4300);\n  }\n\n  removeWinner() {\n    if (!this.state.winner) return;\n    const names = this.parseNames().filter(x => x !== this.state.winner);\n    const v = names.join(\"\\n\");\n    try { localStorage.setItem(this.LIST_KEY, v); } catch (e) {}\n    this.setState({ names: v, winner: null });\n  }\n\n  clearNames() {\n    try { localStorage.setItem(this.LIST_KEY, \"\"); } catch (e) {}\n    this.setState({ names: \"\", winner: null, groups: null, uploadMsg: null, uploadErr: false });\n  }\n\n  clearGroups() {\n    this.setState({ groups: null });\n  }\n\n  makeGroups() {\n    const names = this.parseNames().slice();\n    if (names.length === 0) { this.setState({ groups: [] }); return; }\n    for (let i = names.length - 1; i > 0; i--) {\n      const j = Math.floor(Math.random() * (i + 1));\n      const t = names[i]; names[i] = names[j]; names[j] = t;\n    }\n    let numGroups;\n    const N = Math.max(1, this.state.groupN | 0);\n    if (this.state.groupMode === \"count\") numGroups = Math.min(N, names.length);\n    else numGroups = Math.ceil(names.length / N);\n    numGroups = Math.max(1, numGroups);\n    const groups = Array.from({ length: numGroups }, () => []);\n    names.forEach((nm, i) => groups[i % numGroups].push(nm));\n    this.setState({ groups: groups.map((m, i) => ({ label: \"Team \" + (i + 1), members: m })) });\n  }\n\n  setTimer(sec) { if (this.tick) clearInterval(this.tick); this.setState({ timerSec: sec, timerBase: sec, timerRunning: false }); }\n  applyCustom() {\n    const m = Math.max(0, Math.min(180, parseInt(this.state.customMin, 10) || 0));\n    const s = Math.max(0, Math.min(59, parseInt(this.state.customSec, 10) || 0));\n    const sec = m * 60 + s;\n    if (sec <= 0) return;\n    this.setTimer(sec);\n  }\n  toggleTimer() {\n    if (this.state.timerRunning) { if (this.tick) clearInterval(this.tick); this.setState({ timerRunning: false }); return; }\n    if (this.state.timerSec <= 0) return;\n    this.setState({ timerRunning: true });\n    this.tick = setInterval(() => {\n      this.setState(s => {\n        if (s.timerSec <= 1) { clearInterval(this.tick); return { timerSec: 0, timerRunning: false }; }\n        return { timerSec: s.timerSec - 1 };\n      });\n    }, 1000);\n  }\n  resetTimer() { if (this.tick) clearInterval(this.tick); this.setState(s => ({ timerSec: s.timerBase, timerRunning: false })); }\n\n  addTeam() {\n    const nm = this.state.teamInput.trim();\n    if (!nm) return;\n    this.setState(s => ({ teams: s.teams.concat([{ name: nm, score: 0, id: Date.now() + Math.random() }]), teamInput: \"\" }));\n  }\n  bump(id, d) { this.setState(s => ({ teams: s.teams.map(t => t.id === id ? Object.assign({}, t, { score: Math.max(0, t.score + d) }) : t) })); }\n  removeTeam(id) { this.setState(s => ({ teams: s.teams.filter(t => t.id !== id) })); }\n\n  renderVals() {\n    const names = this.parseNames();\n    const n = names.length;\n\n    // wheel\n    const cols = [[\"#16293f\", \"#f0f4f1\"], [\"#2f8a5b\", \"#16293f\"], [\"#2c4a6b\", \"#f0f4f1\"], [\"#216a44\", \"#f0f4f1\"]];\n    let segments = [];\n    if (n >= 2) {\n      const seg = 360 / n;\n      const cx = 100, cy = 100, r = 96;\n      const pt = (ang) => {\n        const a = (ang - 90) * Math.PI / 180;\n        return [cx + r * Math.cos(a), cy + r * Math.sin(a)];\n      };\n      for (let i = 0; i < n; i++) {\n        const a0 = i * seg, a1 = (i + 1) * seg;\n        const [x0, y0] = pt(a0), [x1, y1] = pt(a1);\n        const large = seg > 180 ? 1 : 0;\n        const d = \"M\" + cx + \" \" + cy + \" L\" + x0.toFixed(2) + \" \" + y0.toFixed(2) +\n          \" A\" + r + \" \" + r + \" 0 \" + large + \" 1 \" + x1.toFixed(2) + \" \" + y1.toFixed(2) + \" Z\";\n        const mid = a0 + seg / 2;\n        const am = (mid - 90) * Math.PI / 180;\n        const lr = 60;\n        const tx = cx + lr * Math.cos(am), ty = cy + lr * Math.sin(am);\n        const c = cols[i % cols.length];\n        let label = names[i];\n        if (label.length > 9) label = label.slice(0, 8) + \"…\";\n        segments.push({\n          d, fill: c[0], color: c[1],\n          tx: tx.toFixed(2), ty: ty.toFixed(2),\n          rotate: (mid > 180 ? mid + 90 : mid - 90).toFixed(1),\n          fs: n > 14 ? \"6\" : (n > 9 ? \"7\" : \"8.5\"),\n          label\n        });\n      }\n    }\n\n    // timer\n    const mm = String(Math.floor(this.state.timerSec / 60)).padStart(2, \"0\");\n    const ss = String(this.state.timerSec % 60).padStart(2, \"0\");\n\n    // teams ranked\n    const ranked = this.state.teams.slice().sort((a, b) => b.score - a.score);\n    const teams = ranked.map((t, i) => ({\n      name: t.name, score: t.score, rank: i + 1,\n      bg: i === 0 && t.score > 0 ? \"rgba(47,138,91,0.1)\" : \"#f5faf6\",\n      border: i === 0 && t.score > 0 ? \"var(--accent)\" : \"#e2ebe4\",\n      rankBg: i === 0 && t.score > 0 ? \"var(--accent)\" : \"#e7efe9\",\n      rankColor: i === 0 && t.score > 0 ? \"#16293f\" : \"#8a8678\",\n      plus: () => this.bump(t.id, 1),\n      minus: () => this.bump(t.id, -1),\n      remove: () => this.removeTeam(t.id)\n    }));\n\n    return {\n      names: this.state.names,\n      onNames: (e) => this.onNames(e.target.value),\n      rot: this.state.rot,\n      spinTransition: this.state.spinning ? \"transform 4.2s cubic-bezier(.17,.67,.12,.99)\" : \"none\",\n      segments,\n      hasWinner: !!this.state.winner,\n      winner: this.state.winner,\n      spin: () => this.spin(),\n      removeWinner: () => this.removeWinner(),\n      spinLabel: this.state.spinning ? \"Spinning…\" : \"Spin the wheel\",\n      spinBtnStyle: \"background:\" + (n < 2 || this.state.spinning ? \"#b7b09e\" : \"var(--accent)\") +\n        \";color:#16293f;font-family:'Schibsted Grotesk';font-weight:700;font-size:15px;padding:12px 22px;border:0;border-radius:10px;cursor:\" +\n        (n < 2 || this.state.spinning ? \"not-allowed\" : \"pointer\") + \";\",\n      countLabel: n === 0 ? \"No students yet — add your class list above.\" : n + \" student\" + (n === 1 ? \"\" : \"s\") + \" on the wheel.\",\n      onFile: (e) => this.onFile(e.target),\n      uploadMsg: this.state.uploadMsg || (n === 0 ? \"No students yet — add your class list above.\" : n + \" student\" + (n === 1 ? \"\" : \"s\") + \" on the wheel.\"),\n      uploadColor: this.state.uploadErr ? \"#c2453f\" : \"#8b978d\",\n\n      setModeCount: () => this.setState({ groupMode: \"count\" }),\n      setModeSize: () => this.setState({ groupMode: \"size\" }),\n      modeCountStyle: this.pill(this.state.groupMode === \"count\"),\n      modeSizeStyle: this.pill(this.state.groupMode === \"size\"),\n      groupPrompt: this.state.groupMode === \"count\" ? \"How many groups?\" : \"Students per group?\",\n      groupN: this.state.groupN,\n      onGroupN: (e) => this.setState({ groupN: Math.max(1, e.target.value | 0) }),\n      makeGroups: () => this.makeGroups(),\n      groups: this.state.groups || [],\n      hasGroups: !!(this.state.groups && this.state.groups.length),\n      noGroups: !(this.state.groups && this.state.groups.length),\n\n      timerDisplay: mm + \":\" + ss,\n      timerColor: this.state.timerSec === 0 ? \"var(--accent)\" : \"#f0f4f1\",\n      timerBtn: this.state.timerRunning ? \"Pause\" : \"Start\",\n      toggleTimer: () => this.toggleTimer(),\n      resetTimer: () => this.resetTimer(),\n      customMin: this.state.customMin,\n      customSec: this.state.customSec,\n      onCustomMin: (e) => this.setState({ customMin: e.target.value }),\n      onCustomSec: (e) => this.setState({ customSec: e.target.value }),\n      applyCustom: () => this.applyCustom(),\n      presets: [\n        { label: \"1 min\", onClick: () => this.setTimer(60) },\n        { label: \"3 min\", onClick: () => this.setTimer(180) },\n        { label: \"5 min\", onClick: () => this.setTimer(300) },\n        { label: \"10 min\", onClick: () => this.setTimer(600) }\n      ],\n\n      teamInput: this.state.teamInput,\n      onTeamInput: (e) => this.setState({ teamInput: e.target.value }),\n      addTeam: () => this.addTeam(),\n      teams,\n      hasTeams: teams.length > 0,\n      noTeams: teams.length === 0,\n\n      // random number\n      rnFrom: this.state.rnFrom,\n      rnTo: this.state.rnTo,\n      onRnFrom: (e) => this.setState({ rnFrom: e.target.value }),\n      onRnTo: (e) => this.setState({ rnTo: e.target.value }),\n      roll: () => this.roll(),\n      rnDisplay: this.state.rnResult === null ? \"?\" : String(this.state.rnResult),\n      rnColor: this.state.rnResult === null ? \"#c4d0c8\" : \"var(--accent-deep)\",\n\n      // attention signal\n      setWork: () => this.setState({ signal: \"work\" }),\n      setWrap: () => this.setState({ signal: \"wrap\" }),\n      setStop: () => this.setState({ signal: \"stop\" }),\n      workDot: this.lightStyle(this.state.signal === \"work\", \"#2f8a5b\"),\n      wrapDot: this.lightStyle(this.state.signal === \"wrap\", \"#d99a2b\"),\n      stopDot: this.lightStyle(this.state.signal === \"stop\", \"#c2453f\"),\n      workText: this.state.signal === \"work\" ? \"#216a44\" : \"#9aa79f\",\n      wrapText: this.state.signal === \"wrap\" ? \"#a9741a\" : \"#9aa79f\",\n      stopText: this.state.signal === \"stop\" ? \"#a3332e\" : \"#9aa79f\",\n      signalHint: this.state.signal === \"work\" ? \"Heads down — independent or group work in progress.\"\n        : this.state.signal === \"wrap\" ? \"Wrap up — bring your work to a close.\"\n        : \"Stop and look up — eyes on the front.\",\n\n      // clear + fullscreen\n      clearNames: () => this.clearNames(),\n      clearGroups: () => this.clearGroups(),\n      openTimerFs: () => this.setState({ fs: \"timer\" }),\n      openSignalFs: () => this.setState({ fs: \"signal\" }),\n      closeFs: () => this.setState({ fs: null }),\n      fsTimer: this.state.fs === \"timer\",\n      fsSignal: this.state.fs === \"signal\",\n      signalFsColor: this.state.signal === \"work\" ? \"#3fbf7a\" : this.state.signal === \"wrap\" ? \"#f2b545\" : \"#f26b63\",\n      signalFsBg: this.state.signal === \"work\" ? \"#164d31\" : this.state.signal === \"wrap\" ? \"#6b4a12\" : \"#5e1f1c\",\n      signalFsLabel: this.state.signal === \"work\" ? \"Work\" : this.state.signal === \"wrap\" ? \"Wrap-up\" : \"Stop\",\n\n      // activity methods\n      methods: [\n        { badge: \"GW\", kicker: \"Collaborative\", title: \"Group Work\" },\n        { badge: \"CS\", kicker: \"Applied\", title: \"Case Studies\" },\n        { badge: \"GM\", kicker: \"Competitive\", title: \"Gamification\" },\n        { badge: \"PS\", kicker: \"Hands-on\", title: \"Problem-Solving Exercises\" },\n        { badge: \"PT\", kicker: \"Explain\", title: \"Peer Teaching\" },\n        { badge: \"SR\", kicker: \"Immersive\", title: \"Simulations & Role-Play\" }\n      ],\n\n      // carousel\n      trackStyle: \"display:flex;transition:transform .55s cubic-bezier(.4,0,.2,1);transform:translateX(-\" + (this.state.slide * 100) + \"%);\",\n      dots: [0, 1, 2, 3].map(i => ({\n        onClick: () => this.setState({ slide: i }),\n        style: \"width:\" + (i === this.state.slide ? \"26px\" : \"9px\") + \";height:9px;border-radius:999px;border:0;cursor:pointer;transition:.25s ease;background:\" +\n          (i === this.state.slide ? \"var(--accent)\" : \"#c4d0c8\") + \";\"\n      }))\n    };\n  }\n\n  pill(on) {\n    return \"font-family:'Schibsted Grotesk';font-weight:700;font-size:13px;cursor:pointer;border-radius:999px;padding:7px 13px;transition:.15s ease;border:1px solid \" +\n      (on ? \"#16293f\" : \"#c9d5cc\") + \";background:\" + (on ? \"#16293f\" : \"transparent\") + \";color:\" + (on ? \"#f0f4f1\" : \"#16293f\") + \";\";\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
