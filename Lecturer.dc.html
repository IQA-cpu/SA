  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

r:blur(12px);border-bottom:1px solid #dbe5de;\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:12px clamp(18px,5vw,48px);display:flex;align-items:center;gap:14px;flex-wrap:wrap;\">\n      <a href=\"Explore.dc.html\" style=\"display:flex;align-items:center;gap:11px;\">\n        <span style=\"background:#16293f;color:#f0f4f1;font-family:'Schibsted Grotesk';font-weight:700;font-size:13px;padding:7px 10px;border-radius:7px;\">ACCT 341<\u002Fspan>\n        <span style=\"font-family:'Schibsted Grotesk';font-weight:700;font-size:16px;color:#16293f;\">Statutory Auditing<\u002Fspan>\n      <\u002Fa>\n      <nav style=\"margin-left:auto;display:flex;align-items:center;gap:1px;font-family:'Schibsted Grotesk';font-weight:600;font-size:13.5px;flex-wrap:wrap;\">\n        <a href=\"Explore.dc.html\" style=\"padding:8px 11px;border-radius:9px;color:#16293f;\">Home<\u002Fa>\n        <a href=\"Explorer.dc.html\" style=\"padding:8px 11px;border-radius:9px;color:#16293f;\">Classroom<\u002Fa>\n        <a href=\"Syllabus.dc.html\" style=\"padding:8px 11px;border-radius:9px;color:#16293f;\">Syllabus<\u002Fa>\n        <a href=\"Study-Hub.dc.html\" style=\"padding:8px 11px;border-radius:9px;color:#16293f;\">Study Hub<\u002Fa>\n        <a href=\"Lecturer.dc.html\" style=\"padding:8px 11px;border-radius:9px;background:rgba(47,138,91,0.14);color:var(--accent-deep);\">Lecturer<\u002Fa>\n        <a href=\"Student.dc.html\" style=\"padding:8px 11px;border-radius:9px;color:#16293f;\">Student<\u002Fa>\n        <a href=\"Active-Learning.dc.html\" style=\"padding:8px 11px;border-radius:9px;color:#16293f;\">Active Learning<\u002Fa>\n        <a href=\"Relax-Zone.dc.html\" style=\"padding:8px 11px;border-radius:9px;color:#16293f;\">Relax Zone<\u002Fa>\n        <a href=\"SA-Chatbot.dc.html\" style=\"padding:8px 11px;border-radius:9px;color:#16293f;\">SA Chatbot<\u002Fa>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <section style=\"max-width:1180px;margin:0 auto;padding:clamp(38px,5vw,60px) clamp(18px,5vw,48px) clamp(22px,3vw,32px);\">\n    <p style=\"font-size:13px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--accent-deep);margin:0 0 14px;\">Section 03<\u002Fp>\n    <h1 style=\"font-family:'Schibsted Grotesk';font-weight:800;font-size:clamp(32px,5vw,52px);line-height:1.02;letter-spacing:-0.025em;color:#16293f;margin:0 0 12px;\">About the Lecturer<\u002Fh1>\n    <p style=\"font-size:16px;line-height:1.65;color:#4a5560;margin:0;\">Meet your instructor for Statutory Auditing (ACCT 341).<\u002Fp>\n  <\u002Fsection>\n\n  <!-- PROFILE -->\n  <section style=\"max-width:1180px;margin:0 auto;padding:0 clamp(18px,5vw,48px) clamp(28px,4vw,44px);display:grid;grid-template-columns:.85fr 1.15fr;gap:clamp(26px,4vw,52px);align-items:start;\">\n    <div>\n      <img src=\"65f8c9d8-0055-48a3-a526-ff21427f7264\" alt=\"Mean Udam\" style=\"width:100%;border-radius:18px;display:block;box-shadow:0 34px 60px -34px rgba(22,41,63,0.55);\">\n      <div style=\"margin-top:18px;background:#16293f;border-radius:16px;padding:22px 24px;color:#fff;\">\n        <p style=\"margin:0;font-family:'Schibsted Grotesk';font-weight:800;font-size:22px;color:#f0f4f1;\">Mean Udam<\u002Fp>\n        <p style=\"margin:4px 0 0;font-size:13.5px;color:var(--accent);font-weight:600;\">MSc · ACCA<\u002Fp>\n        <p style=\"margin:12px 0 0;font-size:14px;color:#cdd5dd;line-height:1.5;\">Assistant Professor &amp; Senior IQA Manager<br>CamEd Business School<\u002Fp>\n        <div style=\"display:flex;flex-wrap:wrap;gap:7px;margin-top:16px;\">\n          <span style=\"background:rgba(47,138,91,0.2);color:var(--accent);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;\">Accounting<\u002Fspan>\n          <span style=\"background:rgba(47,138,91,0.2);color:var(--accent);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;\">Scholarly Academic (SA)<\u002Fspan>\n          <span style=\"background:rgba(47,138,91,0.2);color:var(--accent);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;\">DBA Candidate<\u002Fspan>\n        <\u002Fdiv>\n        <a href=\"https://avatar.cam-ed.com/udamavatar\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex;margin-top:18px;align-items:center;gap:8px;background:var(--accent);color:#16293f;font-family:'Schibsted Grotesk';font-weight:700;font-size:13.5px;padding:11px 17px;border-radius:9px;\">Chat with my AI avatar →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <p style=\"font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-deep);margin:0 0 14px;\">Background<\u002Fp>\n      <p style=\"font-size:15.5px;line-height:1.7;color:#4a5560;margin:0 0 16px;\">Mean Udam is a qualified professional accountant and a member of the Association of Chartered Certified Accountants (ACCA). He holds an MSc in Professional Accountancy from the University of London and is currently a Doctorate of Business Administration candidate at Grenoble École de Management, France.<\u002Fp>\n      <p style=\"font-size:15.5px;line-height:1.7;color:#4a5560;margin:0 0 28px;\">At CamEd Business School he serves as Assistant Professor and Senior Internal Quality Assurance (IQA) Manager, teaching Statutory Auditing (ACCT 341) and Management Accounting 1 (ACCT 221). His work spans quality assurance, internal audit, research supervision and curriculum development, and he is active as an assessor for the ASEAN University Network (AUN-QA).<\u002Fp>\n\n      <div style=\"background:var(--accent-soft);border:1px solid #ece2ce;border-radius:16px;padding:24px 26px;\">\n        <p style=\"font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-deep);margin:0 0 8px;\">Consultation with the lecturer<\u002Fp>\n        <p style=\"margin:0 0 6px;font-family:'Schibsted Grotesk';font-weight:700;font-size:19px;color:#16293f;\">Book a one-to-one meeting<\u002Fp>\n        <p style=\"margin:0 0 18px;font-size:14.5px;line-height:1.6;color:#6b5f45;\">Have a question about the course, an assignment or a concept? Schedule a 30-minute session at a time that works for you.<\u002Fp>\n        <a href=\"mailto:mudam@cam-ed.com?subject=ACCT%20341%20Consultation\" style=\"display:inline-flex;align-items:center;gap:8px;background:#16293f;color:#f0f4f1;font-family:'Schibsted Grotesk';font-weight:700;font-size:14px;padding:12px 19px;border-radius:10px;\">Book a consultation →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- EXPERIENCE -->\n  <section style=\"max-width:1180px;margin:0 auto;padding:clamp(20px,3vw,32px) clamp(18px,5vw,48px) clamp(48px,7vw,84px);\">\n    <p style=\"font-size:13px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--accent-deep);margin:0 0 22px;\">Work experience<\u002Fp>\n    <div style=\"display:flex;flex-direction:column;gap:12px;\">\n      <sc-for list=\"{{ experience }}\" as=\"e\" hint-placeholder-count=\"5\">\n        <div style=\"display:grid;grid-template-columns:150px 1fr;gap:20px;background:#fff;border:1px solid #dbe5de;border-radius:14px;padding:20px 24px;align-items:start;\">\n          <span style=\"font-family:'Schibsted Grotesk';font-weight:700;font-size:13.5px;color:var(--accent-deep);padding-top:2px;\">{{ e.period }}<\u002Fspan>\n          <div>\n            <p style=\"margin:0;font-family:'Schibsted Grotesk';font-weight:700;font-size:16.5px;color:#16293f;\">{{ e.role }}<\u002Fp>\n            <p style=\"margin:2px 0 6px;font-size:13.5px;color:#8a8678;font-weight:600;\">{{ e.org }}<\u002Fp>\n            <p style=\"margin:0;font-size:14px;line-height:1.55;color:#6b7480;\">{{ e.detail }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer style=\"background:#16293f;color:#cdd5dd;\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:clamp(36px,5vw,56px) clamp(18px,5vw,48px) 28px;display:flex;flex-wrap:wrap;gap:16px;justify-content:space-between;align-items:center;\">\n      <div style=\"display:flex;align-items:center;gap:10px;\">\n        <span style=\"background:var(--accent);color:#16293f;font-family:'Schibsted Grotesk';font-weight:700;font-size:12px;padding:6px 9px;border-radius:6px;\">ACCT 341<\u002Fspan>\n        <span style=\"font-size:13.5px;color:#9fb0c0;\">Statutory Auditing · Mean Udam, MSc, ACCA<\u002Fspan>\n      <\u002Fdiv>\n      <a href=\"Explore.dc.html\" style=\"font-family:'Schibsted Grotesk';font-weight:700;font-size:13.5px;color:var(--accent);\">← Back to course home<\u002Fa>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      experience: [\n        { period: \"2026 – Present\", role: \"Assistant Professor\", org: \"CamEd Business School\", detail: \"Teaching Statutory Auditing (ACCT 341) and Management Accounting 1 (ACCT 221); Scholarly Academic (SA) faculty.\" },\n        { period: \"2025 – Present\", role: \"Senior IQA Manager\", org: \"CamEd Business School\", detail: \"Leads internal quality assurance across programs and international accreditation.\" },\n        { period: \"2024 – Present\", role: \"Research Advisor\", org: \"CamEd Business School\", detail: \"Advises undergraduate and postgraduate student research in audit and accounting.\" },\n        { period: \"2024 – Present\", role: \"Editor-in-Chief\", org: \"CamEd Business School\", detail: \"Editorial and review leadership for academic outputs and proceedings.\" },\n        { period: \"2022 – Present\", role: \"Assessor\", org: \"ASEAN University Network (AUN-QA)\", detail: \"Assesses higher-education programmes against regional quality-assurance standards.\" }\n      ]\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
