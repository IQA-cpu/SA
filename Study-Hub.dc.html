document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

293f;\">Relaxing Zone<\u002Fa>\n        <a href=\"SA-Chatbot.dc.html\" style=\"padding:8px 11px;border-radius:9px;color:#16293f;\">SA Chatbot<\u002Fa>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <section style=\"max-width:1180px;margin:0 auto;padding:clamp(38px,5vw,60px) clamp(18px,5vw,48px) clamp(18px,3vw,28px);\">\n    <p style=\"font-size:13px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--accent-deep);margin:0 0 14px;\">Section 02<\u002Fp>\n    <h1 style=\"font-family:'Schibsted Grotesk';font-weight:800;font-size:clamp(32px,5vw,52px);line-height:1.02;letter-spacing:-0.025em;color:#16293f;margin:0 0 16px;\">The Study Hub<\u002Fh1>\n    <p style=\"font-size:16px;line-height:1.65;color:#4a5560;max-width:46em;margin:0;\">The full Statutory Auditing lecture notes, organised into 16 chapters across five parts. Search or filter by part, and tick chapters off as you study. Open any chapter for its key topics, the lecture notes, the study text and a chat tutor — your progress is saved on this device.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- RESOURCE CALLOUTS -->\n  <section style=\"max-width:1180px;margin:0 auto;padding:clamp(6px,2vw,16px) clamp(18px,5vw,48px) 0;\">\n    <a href=\"https://drive.google.com/file/d/1nA9V0NtZl99JgvysmZR7ZFNSQLVZhYG2/view\" target=\"_blank\" rel=\"noopener\" style=\"display:flex;align-items:center;gap:22px;background:#16293f;border-radius:16px;padding:22px 26px;box-shadow:0 44px 84px -52px rgba(22,41,63,0.6);transition:.16s ease;margin-bottom:14px;\" style-hover=\"transform:translateY(-2px);\">\n      <span style=\"flex-shrink:0;width:52px;height:52px;border-radius:12px;background:var(--accent);color:#16293f;font-family:'Schibsted Grotesk';font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;\">PDF<\u002Fspan>\n      <div style=\"flex:1;min-width:0;\">\n        <p style=\"margin:0 0 3px;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);\">Complete lecture notes<\u002Fp>\n        <p style=\"margin:0;font-family:'Schibsted Grotesk';font-weight:700;font-size:clamp(17px,2vw,21px);color:#f0f4f1;\">SA Lecture Notes — all 16 chapters<\u002Fp>\n      <\u002Fdiv>\n      <span style=\"flex-shrink:0;background:var(--accent);color:#16293f;font-family:'Schibsted Grotesk';font-weight:700;font-size:13.5px;border-radius:9px;padding:11px 18px;\">Open full notes →<\u002Fspan>\n    <\u002Fa>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;\">\n      <a href=\"https://drive.google.com/file/d/1UO4H_a7DzWUU4YRybT2Ci06HJmofAT4f/view\" target=\"_blank\" rel=\"noopener\" style=\"display:flex;align-items:center;gap:18px;background:#fff;border:1px solid #dbe5de;border-radius:14px;padding:20px 22px;transition:.16s ease;\" style-hover=\"border-color:var(--accent);transform:translateY(-2px);\">\n        <span style=\"flex-shrink:0;width:46px;height:46px;border-radius:11px;background:var(--accent-soft);color:var(--accent-deep);font-family:'Schibsted Grotesk';font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;\">PDF<\u002Fspan>\n        <div style=\"flex:1;min-width:0;\">\n          <p style=\"margin:0 0 2px;font-size:10.5px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:#8b978d;\">Study text<\u002Fp>\n          <p style=\"margin:0;font-family:'Schibsted Grotesk';font-weight:700;font-size:16.5px;color:#16293f;\">Kaplan FAU Study Text<\u002Fp>\n        <\u002Fdiv>\n        <span style=\"flex-shrink:0;color:var(--accent-deep);font-size:18px;\">→<\u002Fspan>\n      <\u002Fa>\n      <a href=\"https://drive.google.com/file/d/1_6NJgdPY-GzFC58BlGIrGiTMS9IdZSH0/view\" target=\"_blank\" rel=\"noopener\" style=\"display:flex;align-items:center;gap:18px;background:#fff;border:1px solid #dbe5de;border-radius:14px;padding:20px 22px;transition:.16s ease;\" style-hover=\"border-color:var(--accent);transform:translateY(-2px);\">\n        <span style=\"flex-shrink:0;width:46px;height:46px;border-radius:11px;background:var(--accent-soft);color:var(--accent-deep);font-family:'Schibsted Grotesk';font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;\">KIT<\u002Fspan>\n        <div style=\"flex:1;min-width:0;\">\n          <p style=\"margin:0 0 2px;font-size:10.5px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:#8b978d;\">Exam preparation<\u002Fp>\n          <p style=\"margin:0;font-family:'Schibsted Grotesk';font-weight:700;font-size:16.5px;color:#16293f;\">SA Exam Kit<\u002Fp>\n        <\u002Fdiv>\n        <span style=\"flex-shrink:0;color:var(--accent-deep);font-size:18px;\">→<\u002Fspan>\n      <\u002Fa>\n      <a href=\"https://drive.google.com/file/d/1PX5gyA8PrEYIm2u1K63fpl6kY_uaLjR2/view?usp=drive_link\" target=\"_blank\" rel=\"noopener\" style=\"display:flex;align-items:center;gap:18px;background:#fff;border:1px solid #dbe5de;border-radius:14px;padding:20px 22px;transition:.16s ease;\" style-hover=\"border-color:var(--accent);transform:translateY(-2px);\">\n        <span style=\"flex-shrink:0;width:46px;height:46px;border-radius:11px;background:var(--accent-soft);color:var(--accent-deep);font-family:'Schibsted Grotesk';font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;\">PDF<\u002Fspan>\n        <div style=\"flex:1;min-width:0;\">\n          <p style=\"margin:0 0 2px;font-size:10.5px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:#8b978d;\">Reference standards<\u002Fp>\n          <p style=\"margin:0;font-family:'Schibsted Grotesk';font-weight:700;font-size:16.5px;color:#16293f;\">International Standards on Auditing (ISAs)<\u002Fp>\n        <\u002Fdiv>\n        <span style=\"flex-shrink:0;color:var(--accent-deep);font-size:18px;\">→<\u002Fspan>\n      <\u002Fa>\n      <a href=\"https://drive.google.com/drive/folders/1HI5AYnocM_JFm-LxBBLCHPuV-ZrjCbKz?usp=drive_link\" target=\"_blank\" rel=\"noopener\" style=\"display:flex;align-items:center;gap:18px;background:#fff;border:1px solid #dbe5de;border-radius:14px;padding:20px 22px;transition:.16s ease;\" style-hover=\"border-color:var(--accent);transform:translateY(-2px);\">\n        <span style=\"flex-shrink:0;width:46px;height:46px;border-radius:11px;background:var(--accent-soft);color:var(--accent-deep);font-family:'Schibsted Grotesk';font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;\">DIR<\u002Fspan>\n        <div style=\"flex:1;min-width:0;\">\n          <p style=\"margin:0 0 2px;font-size:10.5px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:#8b978d;\">Reference folder<\u002Fp>\n          <p style=\"margin:0;font-family:'Schibsted Grotesk';font-weight:700;font-size:16.5px;color:#16293f;\">Laws &amp; Regulations<\u002Fp>\n        <\u002Fdiv>\n        <span style=\"flex-shrink:0;color:var(--accent-deep);font-size:18px;\">→<\u002Fspan>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CONTROLS -->\n  <section style=\"max-width:1180px;margin:0 auto;padding:clamp(24px,3vw,34px) clamp(18px,5vw,48px) 0;\">\n    <div style=\"display:flex;gap:14px;align-items:center;background:#fff;border:1px solid #dbe5de;border-radius:12px;padding:4px 6px 4px 18px;margin-bottom:16px;box-shadow:0 20px 44px -38px rgba(22,41,63,0.3);\">\n      <svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#8b978d\" stroke-width=\"2\" stroke-linecap=\"round\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><line x1=\"21\" y1=\"21\" x2=\"16.5\" y2=\"16.5\"><\u002Fline><\u002Fsvg>\n      <input type=\"text\" value=\"{{ query }}\" sc-camel-on-input=\"{{ onQuery }}\" placeholder=\"Search chapters &amp; topics…\" style=\"flex:1;min-width:0;border:0;outline:0;background:transparent;font-family:'Public Sans';font-size:15.5px;color:#16293f;padding:12px 0;\">\n      <span style=\"flex-shrink:0;background:var(--accent-soft);color:var(--accent-deep);font-family:'Schibsted Grotesk';font-weight:700;font-size:12.5px;border-radius:8px;padding:8px 13px;\">{{ studiedLabel }}<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-wrap:wrap;gap:9px;align-items:center;\">\n      <sc-for list=\"{{ filters }}\" as=\"f\" hint-placeholder-count=\"6\">\n        <button sc-camel-on-click=\"{{ f.onClick }}\" style=\"{{ f.style }}\">{{ f.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CHAPTER GRID -->\n  <section style=\"max-width:1180px;margin:0 auto;padding:clamp(20px,3vw,30px) clamp(18px,5vw,48px) clamp(40px,6vw,72px);\">\n    <div style=\"{{ gridStyle }}\">\n      <sc-for list=\"{{ cards }}\" as=\"c\" hint-placeholder-count=\"6\">\n        <div style=\"{{ c.wrapStyle }}\">\n          <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px;\">\n            <span style=\"{{ c.numStyle }}\">{{ c.num }}<\u002Fspan>\n            <span style=\"font-family:'Schibsted Grotesk';font-weight:600;font-size:12.5px;color:#8b978d;\">{{ c.page }}<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"margin:0 0 12px;font-family:'Schibsted Grotesk';font-weight:700;font-size:19px;letter-spacing:-0.01em;color:#16293f;line-height:1.15;\">{{ c.title }}<\u002Fp>\n          <ul style=\"margin:0 0 18px;padding:0;list-style:none;display:flex;flex-direction:column;gap:7px;\">\n            <sc-for list=\"{{ c.bullets }}\" as=\"b\" hint-placeholder-count=\"3\">\n              <li style=\"display:flex;gap:10px;align-items:flex-start;font-size:13.5px;line-height:1.45;color:#4a5560;\">\n                <span style=\"flex-shrink:0;width:5px;height:5px;border-radius:999px;background:var(--accent);margin-top:7px;\"><\u002Fspan>\n                <span>{{ b }}<\u002Fspan>\n              <\u002Fli>\n            <\u002Fsc-for>\n          <\u002Ful>\n          <div style=\"display:flex;align-items:center;gap:12px;margin-top:auto;\">\n            <button sc-camel-on-click=\"{{ c.onOpen }}\" style=\"background:#16293f;color:#f0f4f1;font-family:'Schibsted Grotesk';font-weight:700;font-size:13.5px;border:0;border-radius:9px;padding:11px 17px;cursor:pointer;transition:.15s ease;\" style-hover=\"background:var(--accent-deep);\">Open lesson →<\u002Fbutton>\n            <button sc-camel-on-click=\"{{ c.onToggle }}\" style=\"display:inline-flex;align-items:center;gap:9px;background:transparent;border:1px solid {{ c.markBorder }};border-radius:999px;padding:9px 15px;cursor:pointer;transition:.15s ease;\">\n              <span style=\"width:18px;height:18px;border-radius:999px;display:flex;align-items:center;justify-content:center;border:{{ c.dotBorder }};background:{{ c.dotBg }};\">\n                <svg sc-camel-view-box=\"0 0 24 24\" width=\"11\" height=\"11\" fill=\"none\" stroke=\"#16293f\" stroke-width=\"3.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"opacity:{{ c.tickOpacity }};\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>\n              <\u002Fspan>\n              <span style=\"font-family:'Schibsted Grotesk';font-weight:600;font-size:13px;color:{{ c.markColor }};\">{{ c.markLabel }}<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <sc-if value=\"{{ empty }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"text-align:center;padding:48px 20px;color:#8a8678;\">\n        <p style=\"font-family:'Schibsted Grotesk';font-weight:700;font-size:18px;color:#16293f;margin:0 0 6px;\">No chapters match “{{ query }}”<\u002Fp>\n        <p style=\"margin:0;font-size:14px;\">Try a different topic or clear the search.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fsection>\n\n  <!-- Q&A -->\n  <section style=\"background:#e7efe9;border-top:1px solid #dbe5de;\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:clamp(44px,6vw,76px) clamp(18px,5vw,48px);\">\n      <p style=\"font-size:13px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--accent-deep);margin:0 0 12px;\">Questions welcome<\u002Fp>\n      <h2 style=\"font-family:'Schibsted Grotesk';font-weight:800;font-size:clamp(28px,4vw,42px);letter-spacing:-0.02em;color:#16293f;margin:0 0 14px;\">Q &amp; A<\u002Fh2>\n      <p style=\"font-size:15.5px;line-height:1.65;color:#4a5560;max-width:42em;margin:0 0 24px;\">Stuck on a chapter, an exercise or an exam topic? Ask the Statutory Auditing chatbot for an instant explanation, or bring your question to class — no question is too small.<\u002Fp>\n\n      <div style=\"margin-top:8px;border-radius:18px;overflow:hidden;box-shadow:0 30px 60px -36px rgba(22,41,63,0.5);border:1px solid #dbe5de;\">\n        <div style=\"display:flex;align-items:center;gap:10px;padding:12px 20px;background:#16293f;\">\n          \n          \n          <a href=\"https://padlet.com/kprofessor1/sa-jd26-q-a-xlf8cj19l40nnwsg\" target=\"_blank\" rel=\"noopener\" style=\"margin-left:auto;font-size:12px;font-weight:700;color:#16293f;background:var(--accent);padding:6px 12px;border-radius:20px;text-decoration:none;\">Open board →<\u002Fa>\n        <\u002Fdiv>\n        <iframe src=\"https://padlet.com/embed/xlf8cj19l40nnwsg\" title=\"SA JD26 Q &amp; A Padlet board\" style=\"width:100%;height:min(60vh,560px);border:0;display:block;background:#e7efe9;\" allow=\"clipboard-write; encrypted-media; fullscreen\"><\u002Fiframe>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer style=\"background:#16293f;color:#cdd5dd;\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:clamp(36px,5vw,56px) clamp(18px,5vw,48px) 28px;display:flex;flex-wrap:wrap;gap:16px;justify-content:space-between;align-items:center;\">\n      <div style=\"display:flex;align-items:center;gap:10px;\">\n        <span style=\"background:var(--accent);color:#16293f;font-family:'Schibsted Grotesk';font-weight:700;font-size:12px;padding:6px 9px;border-radius:6px;\">ACCT 341<\u002Fspan>\n        <span style=\"font-size:13.5px;color:#9fb0c0;\">Lecture notes prepared by Janice Ng, DESS<\u002Fspan>\n      <\u002Fdiv>\n      <a href=\"Explore.dc.html\" style=\"font-family:'Schibsted Grotesk';font-weight:700;font-size:13.5px;color:var(--accent);\">← Back to course home<\u002Fa>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <!-- LESSON MODAL -->\n  <sc-if value=\"{{ modalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div sc-camel-on-click=\"{{ onClose }}\" style=\"position:fixed;inset:0;z-index:100;background:rgba(22,41,63,0.55);backdrop-filter:blur(3px);display:flex;align-items:flex-start;justify-content:center;padding:clamp(14px,4vw,56px) 16px;overflow-y:auto;\">\n      <div sc-camel-on-click=\"{{ stop }}\" style=\"width:100%;max-width:680px;background:#f0f4f1;border-radius:18px;overflow:hidden;box-shadow:0 60px 120px -40px rgba(0,0,0,0.6);animation:modalIn .22s ease both;\">\n        <div style=\"background:#16293f;padding:24px 26px;display:flex;align-items:flex-start;gap:16px;\">\n          <span style=\"flex-shrink:0;width:44px;height:44px;border-radius:11px;background:var(--accent);color:#16293f;font-family:'Schibsted Grotesk';font-weight:800;font-size:16px;display:flex;align-items:center;justify-content:center;\">{{ mNum }}<\u002Fspan>\n          <div style=\"flex:1;min-width:0;\">\n            <p style=\"margin:0 0 3px;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);\">Chapter {{ mNum }} · {{ mPage }} · {{ mPart }}<\u002Fp>\n            <p style=\"margin:0;font-family:'Schibsted Grotesk';font-weight:700;font-size:22px;color:#f0f4f1;letter-spacing:-0.01em;\">{{ mTitle }}<\u002Fp>\n          <\u002Fdiv>\n          <button sc-camel-on-click=\"{{ onClose }}\" style=\"flex-shrink:0;background:rgba(255,255,255,0.1);border:0;color:#cdd5dd;width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:16px;line-height:1;\">✕<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:2px;padding:12px 20px 0;background:#e7efe9;border-bottom:1px solid #dbe5de;flex-wrap:wrap;\">\n          <sc-for list=\"{{ tabs }}\" as=\"t\" hint-placeholder-count=\"4\">\n            <button sc-camel-on-click=\"{{ t.onClick }}\" style=\"{{ t.style }}\">{{ t.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"padding:24px 26px 28px;\">\n          <sc-if value=\"{{ tabOverview }}\" hint-placeholder-val=\"{{ true }}\">\n            <div>\n              <p style=\"margin:0 0 14px;font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-deep);\">What this chapter covers<\u002Fp>\n              <ul style=\"margin:0 0 20px;padding:0;list-style:none;display:flex;flex-direction:column;gap:10px;\">\n                <sc-for list=\"{{ mBullets }}\" as=\"b\" hint-placeholder-count=\"4\">\n                  <li style=\"display:flex;gap:12px;align-items:flex-start;font-size:15px;line-height:1.5;color:#3a4550;\">\n                    <span style=\"flex-shrink:0;width:6px;height:6px;border-radius:999px;background:var(--accent);margin-top:8px;\"><\u002Fspan>\n                    <span>{{ b }}<\u002Fspan>\n                  <\u002Fli>\n                <\u002Fsc-for>\n              <\u002Ful>\n              <div style=\"background:#fff;border:1px solid #dbe5de;border-radius:12px;padding:16px 18px;font-size:14px;color:#6b7480;line-height:1.55;\">Reading: complete this chapter in the Kaplan study text before class, then reinforce with the exam-kit questions on this topic.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ tabSummary }}\" hint-placeholder-val=\"{{ false }}\">\n            <div>\n              <p style=\"margin:0 0 16px;font-size:15px;line-height:1.6;color:#4a5560;\">A concise, exam-ready summary note for <strong style=\"color:#16293f;\">Chapter {{ mNum }} · {{ mTitle }}<\u002Fstrong> — the key points distilled for quick revision. Opens in a new tab.<\u002Fp>\n              <a href=\"{{ mSummaryUrl }}\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex;align-items:center;gap:9px;background:var(--accent);color:#16293f;font-family:'Schibsted Grotesk';font-weight:700;font-size:14.5px;padding:12px 20px;border-radius:10px;\">Open summary note →<\u002Fa>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ tabQuiz }}\" hint-placeholder-val=\"{{ false }}\">\n            <div>\n              <p style=\"margin:0 0 16px;font-size:15px;line-height:1.6;color:#4a5560;\">Check your understanding of <strong style=\"color:#16293f;\">Chapter {{ mNum }} · {{ mTitle }}<\u002Fstrong> with a quick self-test quiz. Opens in a new tab.<\u002Fp>\n              <a href=\"{{ mQuizUrl }}\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex;align-items:center;gap:9px;background:#16293f;color:#f0f4f1;font-family:'Schibsted Grotesk';font-weight:700;font-size:14.5px;padding:12px 20px;border-radius:10px;\">Start self-test →<\u002Fa>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ tabFlash }}\" hint-placeholder-val=\"{{ false }}\">\n            <div>\n              <p style=\"margin:0 0 16px;font-size:15px;line-height:1.6;color:#4a5560;\">Revise <strong style=\"color:#16293f;\">Chapter {{ mNum }} · {{ mTitle }}<\u002Fstrong> with True or False flashcards — flip through the key statements to test recall. Opens in a new tab.<\u002Fp>\n              <a href=\"{{ mFlashUrl }}\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex;align-items:center;gap:9px;background:var(--accent);color:#16293f;font-family:'Schibsted Grotesk';font-weight:700;font-size:14.5px;padding:12px 20px;border-radius:10px;\">Open flashcards →<\u002Fa>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ tabSlides }}\" hint-placeholder-val=\"{{ false }}\">\n            <div>\n              <p style=\"margin:0 0 16px;font-size:15px;line-height:1.6;color:#4a5560;\">The full lecture slide deck for <strong style=\"color:#16293f;\">Chapter {{ mNum }} · {{ mTitle }}<\u002Fstrong> — the slides used in class. Opens in a new tab.<\u002Fp>\n              <a href=\"{{ mSlidesUrl }}\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex;align-items:center;gap:9px;background:#16293f;color:#f0f4f1;font-family:'Schibsted Grotesk';font-weight:700;font-size:14.5px;padding:12px 20px;border-radius:10px;\">Open slides →<\u002Fa>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ tabBot }}\" hint-placeholder-val=\"{{ false }}\">\n            <div>\n              <p style=\"margin:0 0 16px;font-size:15px;line-height:1.6;color:#4a5560;\">Ask the Statutory Auditing chatbot to explain a concept from this chapter, or turn it into an exam-style question to test yourself.<\u002Fp>\n              <a href=\"SA-Chatbot.dc.html\" style=\"display:inline-flex;align-items:center;gap:9px;background:var(--accent);color:#16293f;font-family:'Schibsted Grotesk';font-weight:700;font-size:14.5px;padding:12px 20px;border-radius:10px;\">Open the SA Chatbot →<\u002Fa>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"margin-top:22px;padding-top:18px;border-top:1px solid #dbe5de;display:flex;align-items:center;justify-content:space-between;gap:14px;\">\n            <button sc-camel-on-click=\"{{ mToggleStudied }}\" style=\"display:inline-flex;align-items:center;gap:9px;background:{{ mStudiedBg }};border:1px solid {{ mStudiedBorder }};border-radius:999px;padding:9px 16px;cursor:pointer;\">\n              <span style=\"width:18px;height:18px;border-radius:999px;display:flex;align-items:center;justify-content:center;border:{{ mDotBorder }};background:{{ mDotBg }};\">\n                <svg sc-camel-view-box=\"0 0 24 24\" width=\"11\" height=\"11\" fill=\"none\" stroke=\"#16293f\" stroke-width=\"3.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"opacity:{{ mTickOpacity }};\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>\n              <\u002Fspan>\n              <span style=\"font-family:'Schibsted Grotesk';font-weight:600;font-size:13.5px;color:{{ mStudiedColor }};\">{{ mStudiedLabel }}<\u002Fspan>\n            <\u002Fbutton>\n            <button sc-camel-on-click=\"{{ onClose }}\" style=\"background:transparent;border:0;color:#8a8678;font-family:'Schibsted Grotesk';font-weight:600;font-size:13.5px;cursor:pointer;\">Close<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;accentTheme&quot;: {\n    &quot;editor&quot;: &quot;enum&quot;,\n    &quot;options&quot;: [&quot;Green&quot;, &quot;Gold&quot;, &quot;Teal&quot;, &quot;Oxblood&quot;, &quot;Indigo&quot;, &quot;Slate&quot;],\n    &quot;default&quot;: &quot;Green&quot;,\n    &quot;tsType&quot;: &quot;string&quot;,\n    &quot;section&quot;: &quot;Appearance&quot;\n  },\n  &quot;cardStyle&quot;: {\n    &quot;editor&quot;: &quot;enum&quot;,\n    &quot;options&quot;: [&quot;Elevated&quot;, &quot;Outlined&quot;, &quot;Filled&quot;],\n    &quot;default&quot;: &quot;Elevated&quot;,\n    &quot;tsType&quot;: &quot;string&quot;,\n    &quot;section&quot;: &quot;Appearance&quot;\n  },\n  &quot;density&quot;: {\n    &quot;editor&quot;: &quot;enum&quot;,\n    &quot;options&quot;: [&quot;Cozy&quot;, &quot;Compact&quot;],\n    &quot;default&quot;: &quot;Cozy&quot;,\n    &quot;tsType&quot;: &quot;string&quot;,\n    &quot;section&quot;: &quot;Appearance&quot;\n  }\n}\">\nclass Component extends DCLogic {\n  KEY = \"acct341_studyhub_studied\";\n\n  state = { studied: {}, query: \"\", filter: \"all\", open: null, tab: \"overview\" };\n\n  chapters = [\n    { id: \"c1\", num: \"01\", page: \"p. 3\", part: \"A\", title: \"Business Environment\", summary: \"https://app.edcafe.ai/summary-note/69b3b46baefb68d7e5384ea7\", quiz: \"https://app.edcafe.ai/quizzes/6a490f779776c1ac0d268470\", flash: \"https://app.edcafe.ai/flashcards/6a4925279776c1ac0d26b9d5\", slides: \"https://drive.google.com/file/d/17fO1qGg-6cvMdxsxCUc9IGVcEx1BF4AH/view\", bullets: [\"Nature, advantages & disadvantages of an audit\", \"True & fair view and reasonable assurance\", \"Duties, rights, appointment & removal of auditors\", \"Purpose and scope of internal audit\"] },\n    { id: \"c2\", num: \"02\", page: \"p. 17\", part: \"A\", title: \"Auditors' Responsibilities\", summary: \"https://app.edcafe.ai/summary-note/69b3c48db72ece2c4dc15f8b\", quiz: \"https://app.edcafe.ai/quizzes/6a490ebcb5253df1c93a0362\", flash: \"https://app.edcafe.ai/flashcards/6a492619b5253df1c93a3599\", slides: \"https://drive.google.com/file/d/1mxxy3IFkjUWD3HGs7iNFVXzwifdHnsqD/view\", bullets: [\"Directors' responsibilities\", \"Fraud vs error; professional scepticism\", \"Contract law & the engagement letter\", \"Liability to clients and third parties\"] },\n    { id: \"c3\", num: \"03\", page: \"p. 27\", part: \"A\", title: \"Audit Regulation\", summary: \"https://app.edcafe.ai/summary-note/69b3d00eb72ece2c4dc18ad4\", quiz: \"https://app.edcafe.ai/quizzes/6a490e869776c1ac0d268321\", flash: \"https://app.edcafe.ai/flashcards/6a492726b5253df1c93a393d\", slides: \"https://drive.google.com/file/d/1bZcz-GTch8E9NdzwX4UYoQl-Sm354bxq/view\", bullets: [\"IFAC, IAASB and the scope of the ISAs\", \"The five ACCA fundamental principles\", \"Independence in mind and appearance\", \"Threats to objectivity & confidentiality\"] },\n    { id: \"c4\", num: \"04\", page: \"p. 37\", part: \"A\", title: \"Auditor Appointment\", summary: \"https://app.edcafe.ai/summary-note/69b3d182aefb68d7e538ea90\", quiz: \"https://app.edcafe.ai/quizzes/6a490e469776c1ac0d268279\", flash: \"https://app.edcafe.ai/flashcards/6a492853b5253df1c93a3b68\", slides: \"https://drive.google.com/file/d/1kwFondbVH4pxrUj5z_kV7TZafpwqgwSt/view\", bullets: [\"Factors before accepting an engagement\", \"Client risk assessment: low vs high risk\", \"Communication with the outgoing auditor\", \"Initial understanding of the entity\"] },\n    { id: \"c5\", num: \"05\", page: \"p. 43\", part: \"B\", title: \"Risk Assessment\", summary: \"https://app.edcafe.ai/summary-note/69b3d2daaefb68d7e538f382\", quiz: \"https://app.edcafe.ai/quizzes/6a490da19776c1ac0d268128\", flash: \"https://app.edcafe.ai/flashcards/6a49296e9776c1ac0d26c17a\", slides: \"https://drive.google.com/file/d/1fz6r3NfiT7jQVI1XcLPnrFY-gzZ9kNaX/view\", bullets: [\"Materiality & performance materiality\", \"Understanding the entity & its environment\", \"Audit risk: inherent, control & detection\", \"The risk-based approach to the audit\"] },\n    { id: \"c6\", num: \"06\", page: \"p. 71\", part: \"B\", title: \"Audit Planning\", summary: \"https://app.edcafe.ai/summary-note/6a48febab5253df1c939e47e\", quiz: \"https://app.edcafe.ai/quizzes/6a490d60b5253df1c93a00d6\", flash: \"https://app.edcafe.ai/flashcards/6a492a65b5253df1c93a4022\", slides: \"https://drive.google.com/file/d/1bFki0eMrp8FPtzSIu8onFZNBBg1zJa-n/view\", bullets: [\"The audit strategy & the audit plan\", \"CAATs, current & permanent files\", \"Quality control over working papers\", \"Audit sampling & sample size\"] },\n    { id: \"c7\", num: \"07\", page: \"p. 99\", part: \"C\", title: \"Internal Control Evaluation\", summary: \"https://app.edcafe.ai/summary-note/6a48ff149776c1ac0d265e6e\", quiz: \"https://app.edcafe.ai/quizzes/6a490b09b5253df1c939fb88\", flash: \"https://app.edcafe.ai/flashcards/6a492b239776c1ac0d26c344\", slides: \"https://drive.google.com/file/d/1fn8Das6gN2VmTN7UHNg-fQsP1tF42eP3/view\", bullets: [\"The five components of internal control\", \"Documenting the control systems\", \"Evaluating systems: ICQs & ICEQs\", \"Inherent limitations of internal control\"] },\n    { id: \"c8\", num: \"08\", page: \"p. 127\", part: \"C\", title: \"Test of Controls (Part 1)\", summary: \"https://app.edcafe.ai/summary-note/6a48ffd69776c1ac0d266081\", quiz: \"https://app.edcafe.ai/quizzes/6a4908b0b5253df1c939f681\", flash: \"https://app.edcafe.ai/flashcards/6a492b9d9776c1ac0d26c3b3\", slides: \"https://drive.google.com/file/d/17A-NQfoFn27XJqNKigeYn30rTbHI2m7H/view\", bullets: [\"Control objectives & control procedures\", \"Purchases & trade payables\", \"Sales & trade receivables\"] },\n    { id: \"c9\", num: \"09\", page: \"p. 139\", part: \"C\", title: \"Test of Controls (Part 2)\", summary: \"https://app.edcafe.ai/summary-note/6a49002a9776c1ac0d26612d\", quiz: \"https://app.edcafe.ai/quizzes/6a49080c9776c1ac0d26756a\", flash: \"https://app.edcafe.ai/flashcards/6a492bda9776c1ac0d26c402\", slides: \"https://drive.google.com/file/d/15qu23lkmsSI85b7YGvs5xoHzUA8CFAeP/view\", bullets: [\"Wages & salaries controls\", \"Illustrating control procedures\", \"Linking tests of control to objectives\"] },\n    { id: \"c10\", num: \"10\", page: \"p. 151\", part: \"D\", title: \"Analytical Procedures & Estimates\", summary: \"https://app.edcafe.ai/summary-note/6a4900c5b5253df1c939e8ba\", quiz: \"https://app.edcafe.ai/quizzes/6a4907c3b5253df1c939f4e4\", flash: \"https://app.edcafe.ai/flashcards/6a492c3f9776c1ac0d26c478\", slides: \"https://drive.google.com/file/d/1MzO4cthngDvdS0kMxWs5OCKx_asBuegV/view\", bullets: [\"Analytical procedures as audit evidence\", \"Auditing accounting estimates\", \"Substantive analytical procedures\"] },\n    { id: \"c11\", num: \"11\", page: \"p. 159\", part: \"D\", title: \"Inventories\", summary: \"https://app.edcafe.ai/summary-note/6a49010db5253df1c939e958\", quiz: \"https://app.edcafe.ai/quizzes/6a49075ab5253df1c939f475\", flash: \"https://app.edcafe.ai/flashcards/6a492ca09776c1ac0d26c512\", slides: \"https://drive.google.com/file/d/1xxxPNHfWUkmVKHoysmQcMpdMF0I5-FY8/view\", bullets: [\"Why inventory is high inherent risk\", \"Attending the inventory count\", \"Perpetual inventory systems\", \"Substantive procedures for inventory\"] },\n    { id: \"c12\", num: \"12\", page: \"p. 173\", part: \"D\", title: \"Non-current Assets\", summary: \"https://app.edcafe.ai/summary-note/6a490157b5253df1c939e9e3\", quiz: \"https://app.edcafe.ai/quizzes/6a4906ff9776c1ac0d26734d\", flash: \"https://app.edcafe.ai/flashcards/6a492d1fb5253df1c93a42f4\", slides: \"https://drive.google.com/file/d/1D00B1kkrjCPgm2ketyOgNI9YMaPlGPP0/view\", bullets: [\"Financial statement assertions\", \"Inspection, confirmation & recalculation\", \"Designing audit programmes\"] },\n    { id: \"c13\", num: \"13\", page: \"p. 183\", part: \"D\", title: \"Accounts Receivable & Cash\", summary: \"https://app.edcafe.ai/summary-note/6a4901da9776c1ac0d2665e9\", quiz: \"https://app.edcafe.ai/quizzes/6a4906bf9776c1ac0d26720b\", flash: \"https://app.edcafe.ai/flashcards/6a492d6bb5253df1c93a435e\", slides: \"https://drive.google.com/file/d/1xc7awvbzE3hEUOF0CAd1RKdJqJBB_km2/view\", bullets: [\"Trade receivables & prepayments\", \"Receivables circularisation\", \"Bank & cash substantive procedures\"] },\n    { id: \"c14\", num: \"14\", page: \"p. 193\", part: \"D\", title: \"Liabilities\", summary: \"https://app.edcafe.ai/summary-note/6a49021fb5253df1c939eaf9\", quiz: \"https://app.edcafe.ai/quizzes/6a49064eb5253df1c939f229\", flash: \"https://app.edcafe.ai/flashcards/6a492dd39776c1ac0d26c677\", slides: \"https://drive.google.com/file/d/1N3xKGmaj1pdWyq6iz1EMTPDtPFFs0cBz/view\", bullets: [\"Trade payables, accruals & other payables\", \"Non-current liabilities\", \"Provisions\"] },\n    { id: \"c15\", num: \"15\", page: \"p. 205\", part: \"E\", title: \"Forming an Audit Judgement\", summary: \"https://app.edcafe.ai/summary-note/6a4902c89776c1ac0d266734\", quiz: \"https://app.edcafe.ai/quizzes/6a490549b5253df1c939f025\", flash: \"https://app.edcafe.ai/flashcards/6a492e3cb5253df1c93a4417\", slides: \"https://drive.google.com/file/d/1-9NjoGMzMa4PM7xQPKvl6rJQiboTbBvd/view\", bullets: [\"Going concern & its indicators\", \"Going concern review procedures\", \"Written representations\"] },\n    { id: \"c16\", num: \"16\", page: \"p. 219\", part: \"E\", title: \"The External Audit Opinion\", summary: \"https://app.edcafe.ai/summary-note/6a49031bb5253df1c939ec82\", quiz: \"https://app.edcafe.ai/quizzes/6a49047c9776c1ac0d266bbb\", flash: \"https://app.edcafe.ai/flashcards/6a492e769776c1ac0d26c736\", slides: \"https://drive.google.com/file/d/1LPXUZoIv1X_CokUmRLkNCf3i23s6b-6D/view\", bullets: [\"Form & content of unmodified reports\", \"Circumstances for a modified opinion\", \"Types of modified audit report\"] }\n  ];\n\n  partNames = { A: \"Part A\", B: \"Part B\", C: \"Part C\", D: \"Part D\", E: \"Part E\" };\n\n  componentDidMount() {\n    try {\n      const raw = localStorage.getItem(this.KEY);\n      if (raw) this.setState({ studied: JSON.parse(raw) });\n    } catch (e) {}\n  }\n\n  save(s) { try { localStorage.setItem(this.KEY, JSON.stringify(s)); } catch (e) {} }\n\n  toggleStudied(id) {\n    this.setState(st => {\n      const studied = Object.assign({}, st.studied);\n      if (studied[id]) delete studied[id]; else studied[id] = true;\n      this.save(studied);\n      return { studied };\n    });\n  }\n\n  renderVals() {\n    const st = this.state;\n\n    const palettes = {\n      Green:   { a: \"#2f8a5b\", d: \"#216a44\", s: \"#dcefe3\" },\n      Gold:    { a: \"#b08d4f\", d: \"#97743a\", s: \"#f3ead8\" },\n      Teal:    { a: \"#2f8f83\", d: \"#1f6a60\", s: \"#dcefeb\" },\n      Oxblood: { a: \"#9e3b3b\", d: \"#7d2a2a\", s: \"#f2e0df\" },\n      Indigo:  { a: \"#4f5bd5\", d: \"#38409e\", s: \"#e4e5f7\" },\n      Slate:   { a: \"#4a6076\", d: \"#33475a\", s: \"#e2e8ef\" }\n    };\n    const pal = palettes[this.props.accentTheme] || palettes.Green;\n    const cardStyle = this.props.cardStyle || \"Elevated\";\n    const compact = (this.props.density || \"Cozy\") === \"Compact\";\n\n    const pad = compact ? \"17px\" : \"24px\";\n    const minCol = compact ? \"250px\" : \"320px\";\n    const gap = compact ? \"10px\" : \"14px\";\n    const gridStyle = \"display:grid;grid-template-columns:repeat(auto-fit,minmax(\" + minCol + \",1fr));gap:\" + gap + \";align-items:stretch;\";\n\n    const surface = (isStudied) => {\n      if (cardStyle === \"Outlined\")\n        return \"background:#fff;border:1.5px solid \" + (isStudied ? \"var(--accent)\" : \"#c9d5cc\") + \";box-shadow:none;\";\n      if (cardStyle === \"Filled\")\n        return \"background:var(--accent-soft);border:1px solid \" + (isStudied ? \"var(--accent)\" : \"transparent\") + \";box-shadow:none;\";\n      return \"background:#fff;border:1px solid \" + (isStudied ? \"var(--accent)\" : \"#dbe5de\") + \";box-shadow:0 22px 46px -36px rgba(22,41,63,0.32);\";\n    };\n\n    const studied = st.studied;\n    const studiedCount = Object.keys(studied).filter(k => studied[k]).length;\n\n    const filterDefs = [\n      { key: \"all\", label: \"All chapters\" },\n      { key: \"A\", label: \"A · Framework\" },\n      { key: \"B\", label: \"B · Planning & Risk\" },\n      { key: \"C\", label: \"C · Internal Control\" },\n      { key: \"D\", label: \"D · Evidence\" },\n      { key: \"E\", label: \"E · Completion\" }\n    ];\n    const filters = filterDefs.map(f => {\n      const on = st.filter === f.key;\n      return {\n        label: f.label,\n        onClick: () => this.setState({ filter: f.key }),\n        style: \"font-family:'Schibsted Grotesk';font-weight:700;font-size:13px;cursor:pointer;border-radius:999px;padding:8px 15px;transition:.15s ease;border:1px solid \" +\n          (on ? \"#16293f\" : \"#c9d5cc\") + \";background:\" + (on ? \"#16293f\" : \"transparent\") + \";color:\" + (on ? \"#f0f4f1\" : \"#16293f\") + \";\"\n      };\n    });\n\n    const q = st.query.trim().toLowerCase();\n    const visible = this.chapters.filter(c => {\n      if (st.filter !== \"all\" && c.part !== st.filter) return false;\n      if (!q) return true;\n      const hay = (c.title + \" \" + c.bullets.join(\" \")).toLowerCase();\n      return hay.includes(q);\n    });\n\n    const cards = visible.map(c => {\n      const isStudied = !!studied[c.id];\n      const i = this.chapters.indexOf(c);\n      return {\n        num: c.num, page: c.page, title: c.title, bullets: c.bullets,\n        wrapStyle: \"display:flex;flex-direction:column;border-radius:16px;padding:\" + pad + \";transition:.15s ease;\" + surface(isStudied),\n        numStyle: \"width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Schibsted Grotesk';font-weight:800;font-size:14px;\" + (isStudied ? \"background:var(--accent);color:#16293f;\" : (cardStyle === \"Filled\" ? \"background:#fff;color:var(--accent-deep);\" : \"background:var(--accent-soft);color:var(--accent-deep);\")),\n        onOpen: () => this.setState({ open: i, tab: \"overview\" }),\n        onToggle: () => this.toggleStudied(c.id),\n        markBorder: isStudied ? \"var(--accent)\" : \"#c9d5cc\",\n        markColor: isStudied ? \"var(--accent-deep)\" : \"#6b7480\",\n        markLabel: isStudied ? \"Studied\" : \"Mark as studied\",\n        dotBorder: isStudied ? \"none\" : \"1.5px solid #cfc8b8\",\n        dotBg: isStudied ? \"var(--accent)\" : \"#fff\",\n        tickOpacity: isStudied ? \"1\" : \"0\"\n      };\n    });\n\n    // modal\n    const modalOpen = st.open !== null;\n    let m = {};\n    if (modalOpen) {\n      const c = this.chapters[st.open];\n      const isStudied = !!studied[c.id];\n      const tabDefs = [\n        { key: \"overview\", label: \"Overview\" },\n        { key: \"summary\", label: \"Summary Note\" },\n        { key: \"quiz\", label: \"Self-Test\" },\n        { key: \"flash\", label: \"Flashcards\" },\n        { key: \"slides\", label: \"Slides\" },\n        { key: \"bot\", label: \"Ask the SA Bot\" }\n      ];\n      m = {\n        mNum: c.num, mPage: c.page, mPart: this.partNames[c.part], mTitle: c.title, mBullets: c.bullets,\n        tabs: tabDefs.map(t => {\n          const on = st.tab === t.key;\n          return {\n            label: t.label,\n            onClick: () => this.setState({ tab: t.key }),\n            style: \"font-family:'Schibsted Grotesk';font-weight:700;font-size:13px;cursor:pointer;border:0;background:transparent;padding:10px 13px;border-bottom:2.5px solid \" +\n              (on ? \"var(--accent)\" : \"transparent\") + \";color:\" + (on ? \"#16293f\" : \"#8a8678\") + \";margin-bottom:-1px;\"\n          };\n        }),\n        tabOverview: st.tab === \"overview\",\n        tabSummary: st.tab === \"summary\",\n        mSummaryUrl: c.summary,\n        tabQuiz: st.tab === \"quiz\",\n        mQuizUrl: c.quiz,\n        tabFlash: st.tab === \"flash\",\n        mFlashUrl: c.flash,\n        tabSlides: st.tab === \"slides\",\n        mSlidesUrl: c.slides,\n        tabBot: st.tab === \"bot\",\n        mToggleStudied: () => this.toggleStudied(c.id),\n        mStudiedBg: isStudied ? \"rgba(47,138,91,0.12)\" : \"transparent\",\n        mStudiedBorder: isStudied ? \"var(--accent)\" : \"#c9d5cc\",\n        mStudiedColor: isStudied ? \"var(--accent-deep)\" : \"#6b7480\",\n        mStudiedLabel: isStudied ? \"Studied\" : \"Mark as studied\",\n        mDotBorder: isStudied ? \"none\" : \"1.5px solid #cfc8b8\",\n        mDotBg: isStudied ? \"var(--accent)\" : \"#fff\",\n        mTickOpacity: isStudied ? \"1\" : \"0\"\n      };\n    }\n\n    return Object.assign({\n      accent: pal.a,\n      accentDeep: pal.d,\n      accentSoft: pal.s,\n      gridStyle,\n      query: st.query,\n      onQuery: (e) => this.setState({ query: e.target.value }),\n      studiedLabel: studiedCount + \" / 16 studied\",\n      filters,\n      cards,\n      empty: visible.length === 0,\n      modalOpen,\n      onClose: () => this.setState({ open: null }),\n      stop: (e) => { e.stopPropagation(); }\n    }, m);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
